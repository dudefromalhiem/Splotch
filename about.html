  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    function ScrollProgress() {
      const [w, setW] = useState(0);
      useEffect(() => {
        const fn = () => setW((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
        window.addEventListener("scroll", fn, { passive: true });
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return <div style={{ position: "fixed", top: 0, left: 0, height: 3, width: w + "%", background: "var(--R)", zIndex: 999, transition: "width .1s linear" }} />;
    }
    function Header({ mobMenu, setMobMenu }) {
      const [scrolled, setScrolled] = useState(false);
      
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);
      
      return (
        <header className={scrolled ? 'scrolled' : ''}>
          <button className="logo-btn" onClick={(e) => { e.preventDefault(); window.location.href='/'; }} title="Splotch">
            <img src="favicon.png" alt="Splotch" style={{ height: 32, width: 'auto', display: 'block', transform: 'scale(2.2)', transformOrigin: 'left center', filter: 'invert(1)' }} />
          </button>
          <nav className="desk-nav" style={{ display: 'flex', gap: '2.5rem', alignItems: 'center' }}>
            <a href="/" className="nl">HOME</a>
            <a href="/shop.html" className="nl">SHOP</a>
            <a href="/about.html" className="nl active-link">ABOUT</a>
          </nav>
          <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
            <a href="/shop.html" className="enter-btn desk-nav">Enter Store</a>
            <button className="mob-ham" onClick={() => setMobMenu(true)}>
              <span /><span /><span />
            </button>
          </div>
        </header>
      );
    }

    function MobMenu({ open, setOpen }) {
      const btnSt = { background: 'none', border: 'none', textAlign: 'left', fontFamily: 'Playfair Display', fontWeight: 900, fontSize: 'clamp(40px,11vw,64px)', letterSpacing: '-0.04em', textTransform: 'uppercase', color: '#fff', lineHeight: 1.1, borderBottom: '1px solid rgba(255,255,255,0.07)', padding: '0.6rem 0', textDecoration: 'none', display: 'block', width: '100%' };
      
      return (
        <div className="mob-menu" style={{ position: 'fixed', inset: 0, zIndex: 600, background: '#0a0a0a', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '3rem 2rem', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform .4s cubic-bezier(.76,0,.24,1)' }}>

          <a href="/" style={btnSt}>HOME</a>

          <a href="/about.html" style={{ ...btnSt, color: 'rgba(255,255,255,0.5)' }}>ABOUT</a>

    function AboutHero() {
      const canvasRef = useRef(null);
      
      useEffect(() => {
        const c = canvasRef.current;
        if (!c) return;
        const ctx = c.getContext('2d');
        let t = 0, raf;
        
        const resize = () => {
          c.width = c.offsetWidth;
          c.height = c.offsetHeight;
        };
        resize();
        window.addEventListener('resize', resize);
        
        const draw = () => {
          ctx.clearRect(0, 0, c.width, c.height);
          for (let i = 0; i < 18; i++) {
            const baseY = (c.height / 17) * i;
            const alpha = 0.03 + (i % 4 === 0 ? 0.035 : 0);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
            ctx.lineWidth = i % 5 === 0 ? 1 : 0.5;
            for (let x = 0; x <= c.width; x += 3) {
              const yy = baseY + Math.sin(x * 0.0038 + t + i * 0.5) * 26 + Math.sin(x * 0.0075 + t * 1.3 + i) * 12;
              x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
            }
            ctx.stroke();
          }
          
          [[c.width * 0.15, c.height * 0.5, 100, 38, 0], [c.width * 0.8, c.height * 0.45, 130, 45, 1.2]].forEach(([cx, cy, rx, ry, ph]) => {
            const ox = Math.sin(t * 0.22 + ph) * 18;
            for (let r = 1; r <= 3; r++) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(255,255,255,${0.02 + r * 0.01})`;
              ctx.lineWidth = 0.5;
              ctx.ellipse(cx + ox, cy, rx + r * 35, ry + r * 12, 0.1, 0, Math.PI * 2);
              ctx.stroke();
            }
          });
          
          t += 0.006;
          raf = requestAnimationFrame(draw);
        };
        
        raf = requestAnimationFrame(draw);
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);

<script>
  (function(){
    var cvs=document.getElementById('liquid-cursor-canvas');
    if (!cvs) return;
    var ctx=cvs.getContext('2d');
    var BASE_R=8, EASE=0.35, MAX_STRETCH=26, MIN_SQUASH=3;
    var currentR=BASE_R;
    var mouse={x:window.innerWidth/2,y:window.innerHeight/2};
    var drop={x:mouse.x,y:mouse.y};
    var isClicking=false;
    
    function resize(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;}
    resize();
    window.addEventListener('resize',resize);
    window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
    
    // Physics Click Events
    window.addEventListener('mousedown', function(){ isClicking=true; });
    window.addEventListener('mouseup', function(){ isClicking=false; });
    window.addEventListener('touchstart', function(){ isClicking=true; });
    window.addEventListener('touchend', function(){ isClicking=false; });

    (function animate(){
      ctx.clearRect(0,0,cvs.width,cvs.height);
      
      // Spring target for clicking (compress to 35% size)
      var targetR = isClicking ? BASE_R * 0.35 : BASE_R;
      currentR += (targetR - currentR) * 0.4; // Springy snap effect
      
      var dx=mouse.x-drop.x, dy=mouse.y-drop.y;
      drop.x+=dx*EASE; drop.y+=dy*EASE;
      
      var speed=Math.sqrt(dx*dx+dy*dy);
      var angle=Math.atan2(dy,dx);
      
      // Calculate stretch and squash based on movement and click state
      var stretch=Math.min(speed*0.40, MAX_STRETCH);
      if(isClicking) stretch *= 0.1; // Don't stretch while squashed
      
      var majorR=currentR+stretch*0.5;
      var minorR=Math.max(currentR-speed*0.10, MIN_SQUASH);
      
      ctx.save();
      ctx.translate(drop.x,drop.y);
      ctx.rotate(angle);
      
      // Main droplet body
      ctx.beginPath();
      ctx.ellipse(-(stretch*0.5),0,majorR,minorR,0,0,Math.PI*2);
      ctx.fillStyle='#ffffff';
      ctx.fill();
      
      ctx.restore();
      requestAnimationFrame(animate);
    })();
  })();
  </script>
