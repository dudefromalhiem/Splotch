  <style>
    :root {
      --B:#111111;
      --W:#FFFFFF;
      --R:#DC1C1C;
    }
    
    *, *::before, *::after {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }
    
    html {
      scroll-behavior:smooth;
    }
    
    body {
      background:var(--W);
      color:var(--B);
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }
    
    ::selection {
      background:var(--B);
      color:var(--W);
    }

    @media (pointer: fine) {
      body,button,a,*,*::before,*::after {
        cursor:none !important;
      }
    }
    
    @media (pointer: coarse) {
      .cursor-dot {
        display:none !important;
      }
    }
    
    .cursor-dot {
      position:fixed;
      width:24px;
      height:24px;
      border:1.5px solid #fff;
      border-radius:50% !important;
      transform:translate(-50%,-50%);
      pointer-events:none;
      z-index:99999;
      mix-blend-mode:difference;
      transition:width .25s cubic-bezier(.175,.885,.32,1.275), height .25s;
      top:0;
      left:0;
    }
    
    .cursor-dot.hovered {
      width:44px;
      height:44px;
    }
    
    .cursor-dot.clicked {
      width:8px;
      height:8px;
      background:#fff;
    }

    .grain {
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:9998;

    }

      border-bottom:1.5px solid rgba(17,17,17,0.12);
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:border-color .3s, background .3s;
    } 
    
    header.scrolled {
      background:rgba(255,255,255,0.97);
      border-color:rgba(17,17,17,0.18);

      text-transform:uppercase;
      transition:color .2s;
    }
    
    .nl:hover { color:#111; }
    .nl.active-link { color:#111; }
    .nl::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1.5px; background:#111; transition:width .2s; }
    .nl:hover::after, .nl.active-link::after { width:100%; }
    
    .enter-btn {

      color:#fff;
      border:none;

      transition:background .2s, transform .15s;
