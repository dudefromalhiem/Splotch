  <style>
    :root {
      --B: #111111;
      --W: #FFFFFF;
      --R: #DC1C1C;
    }
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      background: var(--B);
      color: var(--W);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    
    ::selection {
      background: var(--W);
      color: var(--B);
    }

    @media (pointer: fine) {
      body, button, a, input, *, *::before, *::after {
        cursor: none !important;
      }
    }
    
    @media (pointer: coarse) {
      .cursor-dot {
        display: none !important;
      }
    }
    
    .cursor-dot {
      position: fixed;
      width: 24px;
      height: 24px;
      border: 1.5px solid #fff;
      border-radius: 50% !important;
      transform: translate(-50%,-50%);
      pointer-events: none;
      z-index: 99999;
      mix-blend-mode: difference;
      transition: width .25s, height .25s, opacity .2s;
      top: 0;
      left: 0;
    }
    
    .cursor-dot.hovered {
      width: 44px;
      height: 44px;
    }
    
    .cursor-dot.clicked {
      width: 8px;
      height: 8px;
      background: #fff;
    }

    }

    .hero-corner {

    .hero-corner.tr { top: 5.5rem; right: 2rem; text-align: right; line-height: 1.8; }
    .hero-corner.bl { bottom: 6rem; left: 2rem; }
    .hero-corner.br { bottom: 6rem; right: 2rem; }

    .ticker-wrap {
      position: relative;
      z-index: 10;
      height: 30px;
      overflow: hidden;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 2px solid #111;
    }

      display: flex;

      white-space: nowrap;
    }

      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #111;
      flex-shrink: 0;
    }
    
    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--R);
      z-index: 9997;
      width: 0%;

    .section-label {

    #scroll-section {
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
    }
    
    #scroll-section::before {
      content: '';

      background: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.025) 39px,rgba(255,255,255,0.025) 40px),
                  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.025) 39px,rgba(255,255,255,0.025) 40px);

    }

    /* 3D Container Scroll Product CSS */
    #product-scroll-strip {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .ps-track {
      display: flex;
      gap: 20px;
      height: 100%;
      align-items: center;
      padding: 0 20px;
      animation: psScroll 38s linear infinite;
      will-change: transform;
    }
    
    .ps-track:hover {
      animation-play-state: paused;
    }
    
    @keyframes psScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    .ps-card {
      height: 90%;
      aspect-ratio: 3/4;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      transition: border-color .3s, transform .3s cubic-bezier(.25,1,.5,1);
    }
    
    .ps-card:hover {
      border-color: rgba(255,255,255,0.4);
      transform: scale(0.98);
    }
    
    .ps-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.85) saturate(0.88);
      transition: filter .4s, transform .5s cubic-bezier(.25,1,.5,1);
    }
    
    .ps-card:hover .ps-card-img {
      filter: brightness(1) saturate(1);
      transform: scale(1.05);
    }
    
    .ps-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 1.2rem 1.2rem;

      transition: opacity .3s;
      pointer-events: none;
    }

      opacity: 1;
    }
    
    .ps-card-name {

      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      display: block;
    }
    
    .ps-card-tag {

      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
      display: block;
    }
    
    .ps-shimmer {
      height: 90%;
      aspect-ratio: 3/4;
      flex-shrink: 0;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }

    #cta {
      background: #111;
      position: relative;
      overflow: hidden;
    }
    
    .chrome-effect {
      background-image: linear-gradient(
        to bottom,
        #ffffff 0%,
        #a1a1a1 40%,
        #111111 48%,
        #333333 50%,
        #a1a1a1 60%,
        #ffffff 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.1);
      filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
      display: inline-block;
      padding-bottom: 0.15em;

      -webkit-background-clip: text;
      background-clip: text;

      display: inline-block;
      padding-bottom: 0.15em;

      100%{background-position:-200% center}

    .cyber-text:hover {

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { useScroll, useTransform, motion } = window.Motion;

    function useCanvasBg(canvasRef) {
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let raf;
        let mouseX = 0.5, mouseY = 0.5;
        let t = 0;

        const resize = () => {
          canvas.width = canvas.offsetWidth * Math.min(window.devicePixelRatio, 1.5);
          canvas.height = canvas.offsetHeight * Math.min(window.devicePixelRatio, 1.5);
          ctx.scale(Math.min(window.devicePixelRatio, 1.5), Math.min(window.devicePixelRatio, 1.5));
        };
        
        resize();
        window.addEventListener('resize', resize);
        
        const onMouse = (e) => {
          mouseX = e.clientX / window.innerWidth;
          mouseY = e.clientY / window.innerHeight;
        };
        window.addEventListener('mousemove', onMouse);

        const W = () => canvas.offsetWidth;
        const H = () => canvas.offsetHeight;

        const draw = () => {
          ctx.clearRect(0, 0, W(), H());
          for (let i = 0; i < 22; i++) {
            const baseY = (H() / 21) * i;
            const alpha = 0.028 + (i % 4 === 0 ? 0.04 : 0) + (i % 7 === 0 ? 0.03 : 0);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
            ctx.lineWidth = i % 5 === 0 ? 1.2 : 0.6;
            for (let x = 0; x <= W(); x += 3) {
              const yy = baseY + Math.sin(x * (0.0035 + mouseX * 0.0018) + t + i * 0.45) * (28 + mouseY * 20) + Math.sin(x * (0.007 + mouseY * 0.001) + t * 1.4 + i * 0.9) * 14 + Math.sin(x * 0.015 + t * 0.7 + i * 0.3) * 8;
              x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
            }
            ctx.stroke();
          }
          
          [ { cx: W() * 0.2, cy: H() * 0.55, rx: 130, ry: 48, phase: 0 }, { cx: W() * 0.75, cy: H() * 0.42, rx: 110, ry: 40, phase: 1.5 }, { cx: W() * 0.5, cy: H() * 0.68, rx: 180, ry: 60, phase: 3 }].forEach(({ cx, cy, rx, ry, phase }) => {
            const ox = Math.sin(t * 0.25 + phase) * 22;
            const oy = Math.cos(t * 0.18 + phase) * 14;
            for (let r = 1; r <= 4; r++) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(255,255,255,${0.022 + r * 0.009})`;
              ctx.lineWidth = r === 4 ? 1 : 0.5;
              ctx.ellipse(cx + ox, cy + oy, rx + r * 40, ry + r * 14, 0.15, 0, Math.PI * 2);
              ctx.stroke();
            }
          });
          
          if (!draw._particles) {
            draw._particles = Array.from({ length: 35 }, () => ({
              x: Math.random() * W(), y: Math.random() * H(),
              vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2,
              r: Math.random() * 1.2 + 0.3
            }));
          }
          
          draw._particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = W();
            if (p.x > W()) p.x = 0;
            if (p.y < 0) p.y = H();
            if (p.y > H()) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fill();
          });
          
          t += 0.007;
          raf = requestAnimationFrame(draw);
        };
        
        raf = requestAnimationFrame(draw);
        
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
          window.removeEventListener('mousemove', onMouse);
        };
      }, []);
    }

    function Cursor() {
      useEffect(() => {
        const el = document.getElementById('cursor');
        if (!el) return;
        
        const move = (e) => {
          el.style.left = e.clientX + 'px';
          el.style.top = e.clientY + 'px';
        };
        
        const down = () => {
          el.classList.remove('hovered');
          el.classList.add('clicked');
        };
        
        const up = () => {
          el.classList.remove('clicked');
        };
        
        const hover = () => {
          el.classList.add('hovered');
        };
        
        const unhover = () => {
          el.classList.remove('hovered');
        };
        
        window.addEventListener('mousemove', move);
        window.addEventListener('mousedown', down);
        window.addEventListener('mouseup', up);
        
        document.querySelectorAll('a,button,.display-card-link,select,input').forEach(n => {
          n.addEventListener('mouseenter', hover);
          n.addEventListener('mouseleave', unhover);
        });
        
        return () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mousedown', down);
          window.removeEventListener('mouseup', up);
        };
      }, []);
      
      return null;
    }

    function ScrollProgress() {
      useEffect(() => {
        const bar = document.getElementById('progress');
        const fn = () => {
          if (bar) {
            bar.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%';
          }
        };
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return null;
    }

    function buildAggressive3D(mx, my) {
      const layers = [];
      for(let i=1; i<=8; i++) {
        layers.push(`${(mx * i * 2).toFixed(1)}px ${(my * i * 2).toFixed(1)}px 0px #DC1C1C`);
      }
      for(let i=9; i<=14; i++) {
        layers.push(`${(mx * i * 2).toFixed(1)}px ${(my * i * 2).toFixed(1)}px 0px #1a1a1a`);
      }
      layers.push(`${(mx * 16 * 2).toFixed(1)}px ${(my * 16 * 2).toFixed(1)}px 40px rgba(0,0,0,0.9)`);
      return layers.join(', ');
    }

    function Hero() {
      const canvasRef = useRef(null);
      useCanvasBg(canvasRef);
      
      const [smooth, setSmooth] = useState({ x: 0, y: 0 });
      const targetRef = useRef({ x: 0, y: 0 });
      const curRef = useRef({ x: 0, y: 0 });
      const rafRef = useRef(null);
      
      useEffect(() => {
        const lerp = (a, b, t) => a + (b - a) * t;
        const tick = () => {
          curRef.current.x = lerp(curRef.current.x, targetRef.current.x, 0.06);
          curRef.current.y = lerp(curRef.current.y, targetRef.current.y, 0.06);
          setSmooth({ x: curRef.current.x, y: curRef.current.y });
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, []);
      
      const onMove = useCallback((e) => {
        targetRef.current = {
          x: (e.clientX / window.innerWidth - 0.5) * 2,
          y: (e.clientY / window.innerHeight - 0.5) * 2

      }, []);

      return (

    function ProductScroll() {
      const [products, setProducts] = useState(null);
      
      useEffect(() => {
        const load = async () => {
          try {
            if (!window.landingDb) throw new Error('db not ready');
            const snap = await window.landingGetDocs(window.landingCollection(window.landingDb, 'products'));
            const fetched = [];
            snap.forEach(d => fetched.push({ id: d.id, ...d.data() }));
            setProducts(fetched.length ? fetched : FALLBACK_PRODUCTS);
          } catch(e) {
            setProducts(FALLBACK_PRODUCTS);
          }
        };
        
        if (window.landingDb) {
          load();
        } else {
          window.addEventListener('landing-firebase-ready', load, { once: true });
          const t = setTimeout(() => {
            if (!window.landingDb) setProducts(FALLBACK_PRODUCTS);

          return () => clearTimeout(t);

      }, []);

      const cards = React.useMemo(() => {
        if (!products) return [];
        const out = [];
        products.forEach(p => {
          if (p.frontImage) out.push({ src: p.frontImage, name: p.name, tag: p.tag || '' });
          if (p.hasBack && p.backImage) out.push({ src: p.backImage, name: p.name, tag: 'Back View' });
        });
        
        const base = out.slice();
        while (out.length < 8) out.push(...base);
        return [...out, ...out];

    function Manifesto() {
      const topoRef = useRef(null);
      
      useEffect(() => {
        const c = topoRef.current;
        if (!c) return;
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth;
        c.height = c.offsetHeight;
        let t = 0, raf;
        
        const draw = () => {
          ctx.clearRect(0, 0, c.width, c.height);
          for (let i = 0; i < 12; i++) {
            const y = (c.height / 12) * i + c.height / 24;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255,255,255,${0.025 + (i % 3 === 0 ? 0.02 : 0)})`;
            ctx.lineWidth = i % 4 === 0 ? 0.8 : 0.4;
            for (let x = 0; x <= c.width; x += 4) {
              const yy = y + Math.sin(x * 0.004 + t + i * 0.5) * 18 + Math.sin(x * 0.009 + t * 1.2 + i) * 9;
              x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
            }
            ctx.stroke();
          }
          t += 0.004;
          raf = requestAnimationFrame(draw);
        };
        
        raf = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(raf);
      }, []);

    function CTA() {
      const ref = useRef(null);
      
      useEffect(() => {
        const c = ref.current;
        if (!c) return;
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth;
        c.height = c.offsetHeight;
        let t = 0, raf;
        
        const draw = () => {
          ctx.clearRect(0, 0, c.width, c.height);
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.lineWidth = 1;
          const step = 44;
          const offset = (t * 25) % step;
          
          for (let x = 0; x <= c.width + step; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, c.height);
            ctx.stroke();
          }
          for (let y = -step + offset; y <= c.height; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(c.width, y);
            ctx.stroke();
          }
          
          t += 0.008;
          raf = requestAnimationFrame(draw);
        };
        
        raf = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(raf);
      }, []);

    function TermsModal({ onClose }) {
      return (
        <div className="modal-overlay" onClick={onClose} style={{ animation: "fadeIn .2s ease" }}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}>✕</button>
            <h2 style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 28, marginBottom: "1rem" }}>Terms & Conditions</h2>
            <div style={{ fontSize: 12, lineHeight: 1.8, color: "rgba(0,0,0,0.7)" }}>
              <p style={{ marginBottom: "1rem" }}><strong>1. General Conditions</strong><br/>By visiting our site and/or purchasing something from us, you engage in our "Service" and agree to be bound by the following terms and conditions. Splotch reserves the right to refuse service to anyone for any reason at any time.</p>
              <p style={{ marginBottom: "1rem" }}><strong>2. Products & Exclusivity</strong><br/>All Splotch runs are strictly limited. We do not mass produce. Once an item is sold out, it is permanently archived. We have made every effort to display as accurately as possible the colors and images of our products.</p>
              <p style={{ marginBottom: "1rem" }}><strong>3. Billing & Accuracy</strong><br/>You agree to provide current, complete and accurate purchase and account information for all purchases made at our store.</p>
              <p style={{ marginBottom: "1rem" }}><strong>4. Returns & Refunds</strong><br/>We maintain a strict 7-day return policy. Returns and refunds are only allowed within 7 days of receiving the product. Items must be unworn, unwashed, and in original packaging. Use the "Request Return" button to initiate the process.</p>
            </div>
          </div>
        </div>
      );
    }
    
    function ReturnModal({ onClose }) {
      const [form, setForm] = useState({ orderId: "", email: "", reason: "" });
      const [loading, setLoading] = useState(false);
      const [sent, setSent] = useState(false);
      const [errMsg, setErrMsg] = useState("");
      
      const submit = async (e) => {
        e.preventDefault();
        if (!form.orderId || !form.email || !form.reason) return;
        setLoading(true); setErrMsg("");
        try {
          if (!window.landingDb || !window.landingAddDoc) throw new Error("Firebase not connected.");
          await window.landingAddDoc(window.landingCollection(window.landingDb, "messages"), {
            name: "RETURN REQUEST",
            email: form.email,
            message: `Order ID: ${form.orderId}\nReason: ${form.reason}`,
            timestamp: new Date()
          });
          setSent(true);
        } catch (err) {
          setErrMsg("Failed to send request. Please try again later.");
        } finally {
          setLoading(false);
        }
      };
      
      const iSt = { display: "block", width: "100%", border: "2px solid rgba(0,0,0,0.14)", padding: "12px", fontSize: 12, fontFamily: "Inter", marginBottom: "1rem" };
      
      return (
        <div className="modal-overlay" onClick={onClose} style={{ animation: "fadeIn .2s ease" }}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}>✕</button>
            <h2 style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 28, marginBottom: "0.5rem" }}>Request Return.</h2>
            <p style={{ fontSize: 12, color: "rgba(0,0,0,0.5)", marginBottom: "2rem" }}>Returns are only accepted within 7 days of delivery.</p>
            
            {errMsg && <div style={{ background: "#c00", color: "#fff", padding: "10px", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "1.5rem" }}>{errMsg}</div>}
            
            {sent ? (
              <div style={{ background: "#f0f0f0", padding: "2rem", textAlign: "center" }}>
                <p style={{ fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", fontSize: 12, color: "#111" }}>Request Sent Successfully.</p>
                <p style={{ fontSize: 11, color: "#666", marginTop: "1rem" }}>Our team will review your request and contact you via email within 24-48 hours.</p>
              </div>
            ) : (
              <form onSubmit={submit}>
                <input type="text" placeholder="Order ID (e.g. pay_XXXXX)" value={form.orderId} onChange={e => setForm({ ...form, orderId: e.target.value })} style={iSt} required />
                <input type="email" placeholder="Email Address used for order" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} style={iSt} required />
                <textarea placeholder="Reason for return" value={form.reason} rows={4} onChange={e => setForm({ ...form, reason: e.target.value })} style={{ ...iSt, resize: "none" }} required />
                <button type="submit" disabled={loading} style={{ width: "100%", background: "#111", color: "#fff", border: "3px solid #111", padding: "14px", fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", cursor: "pointer" }}>
                  {loading ? "Submitting..." : "Submit Return Request"}
                </button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [mobMenu, setMobMenu] = useState(false);
      const [termsOpen, setTermsOpen] = useState(false);
      const [returnOpen, setReturnOpen] = useState(false);
      
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) e.target.classList.add('visible');
          });
        }, { threshold: 0.08 });
        
        const fn = () => {
          document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        };
        
        fn();
        setTimeout(fn, 500);
        return () => obs.disconnect();
      }, []);

      return (
        <div style={{ minHeight: '100vh', background: '#111', overflowX: 'hidden', position: 'relative' }}>
          <ScrollProgress />
          <Cursor />
          <Header mobMenu={mobMenu} setMobMenu={setMobMenu} />
          <MobMenu open={mobMenu} setOpen={setMobMenu} />

          <Hero />
          <Ticker />

          <section id="scroll-section">
            <ContainerScroll
              titleComponent={
                <div style={{ marginBottom: '2rem' }}>
                  <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.3em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.3)', display: 'block', marginBottom: '1.2rem' }}>
                    Engineered in Bangalore
                  </span>
                  <h2 style={{ fontFamily: 'Playfair Display', fontStyle: 'italic', fontWeight: 700, fontSize: 'clamp(36px,6vw,80px)', color: '#fff', lineHeight: 1, letterSpacing: '-0.03em', marginBottom: '0.5rem' }}>
                    Pure Form. Strict Utility.
                  </h2>
                  <span style={{ fontFamily: 'Inter', fontWeight: 900, fontSize: 'clamp(52px,10vw,130px)', letterSpacing: '-0.05em', textTransform: 'uppercase', color: '#fff', lineHeight: 0.85, display: 'block' }}>
                    THE ARCHIVE.
                  </span>
                </div>
              }
            >
              <ProductScroll />
            </ContainerScroll>
          </section>

          <BrandStrip />
          <ScrollBand />
          <Manifesto />
          <CTA />

          <footer>
            <img src="favicon.png" alt="Splotch" style={{ height: 26, filter: 'invert(1)', opacity: 0.35 }} />
            <div style={{ display: 'flex', gap: '2rem' }}>
              <a onClick={() => setTermsOpen(true)}>Terms & Conditions</a>
              <a onClick={() => setReturnOpen(true)}>Request Return</a>
              <a href="https://www.instagram.com/splotchglobal" target="_blank">Instagram</a>
              <a href="https://x.com/splotchglobal" target="_blank">Twitter</a>
            </div>
            <div style={{display: 'flex', alignItems: 'center'}}>
               <span className="ghost-credit" style={{marginRight: "10px"}}>// Engineered by Dudefromalhiem</span>
               <span>© 2026 Splotch.</span>
            </div>
          </footer>

          <div style={{ background: '#050505', padding: '2rem', borderTop: '1px solid rgba(255,255,255,0.03)' }}>
            <p style={{ maxWidth: 800, margin: '0 auto', fontSize: 9, lineHeight: 2, color: 'rgba(255,255,255,0.12)', fontWeight: 500, letterSpacing: '0.12em', textAlign: 'center', textTransform: 'uppercase' }}>
              Every order includes premium packaging, custom stickers, and a personalized handwritten note.<br/><br/>
              Splotch is an independent streetwear clothing brand engineered in Bangalore, India. Premium oversized t-shirts, limited-drop techwear, and urban utility clothing for the modern aesthetic. Zero mass production. Every run limited to 200 units. Explore Collection 001. Contemporary Indian streetwear. Style beyond seasons. Created in 2026.
            </p>
          </div>
          
          {termsOpen && <TermsModal onClose={() => setTermsOpen(false)} />}
          {returnOpen && <ReturnModal onClose={() => setReturnOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
