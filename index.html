<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="title" content="Splotch | Urban Techwear & Streetwear India">
  <meta name="description" content="Engineering the next frontier of Indian streetwear. Limited drop techwear, oversized tees, and urban utility gear. Made in Bangalore.">
  <meta name="keywords" content="streetwear India, techwear, oversized t-shirts, Splotch clothing, Bangalore fashion">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://splotch.vercel.app/">
  <meta property="og:title" content="Splotch | Urban Techwear">
  <meta property="og:description" content="Style beyond seasons. Explore the SS'26 Terrain Collection.">
  <meta property="og:image" content="https://splotch.vercel.app/splotch-og-image.jpg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splotch Website</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-type="module"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
      getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut,
      createUserWithEmailAndPassword, signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { 
      getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc, getDoc, updateDoc, increment, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeq4FeU1LQKTyZAIJd7HL834rEUqQ0eTQ",
      authDomain: "splotchclothing.firebaseapp.com",      
      projectId: "splotchclothing",
      storageBucket: "splotchclothing.firebasestorage.app",
      messagingSenderId: "791501370137",
      appId: "1:791501370137:web:4ccc972b997d9d06f8cb88"
    };

    try {
      const app = initializeApp(firebaseConfig);
      window.fbDb = getFirestore(app);
      window.fbAuth = getAuth(app);
      window.fbProvider = new GoogleAuthProvider();
      
      window.fbSignInWithPopup = signInWithPopup;
      window.fbSignOut = signOut;
      window.fbOnAuthStateChanged = onAuthStateChanged;
      window.fbCreateUserWithEmailAndPassword = createUserWithEmailAndPassword;
      window.fbSignInWithEmailAndPassword = signInWithEmailAndPassword;

      window.fbCollection = collection;
      window.fbAddDoc = addDoc;
      window.fbGetDocs = getDocs;
      window.fbGetDoc = getDoc; 
      window.fbDoc = doc;
      window.fbSetDoc = setDoc;
      window.fbDeleteDoc = deleteDoc;
      window.fbUpdateDoc = updateDoc;
      window.fbIncrement = increment;
      window.fbQuery = query;
      window.fbOrderBy = orderBy;

      window.dispatchEvent(new Event('firebase-ready'));
    } catch(err) { console.error("Firebase Init Error:", err); }
  </script>

  <style>
    /* 1. CUSTOM ELASTIC CURSOR */
    body, button, a, input, textarea, select { cursor: none !important; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
    
    :root { --B: #111111; --W: #FFFFFF; }
    html { scroll-behavior: smooth; }
    body { background: var(--W); color: var(--B); font-family: 'Inter', sans-serif; overflow-x: hidden; }
    ::selection { background: var(--B); color: var(--W); }

    .cursor-dot {
      position: fixed; top: 0; left: 0; width: 28px; height: 28px; border: 2px solid #fff;
      border-radius: 50% !important; transform: translate(-50%, -50%); pointer-events: none;
      z-index: 99999; mix-blend-mode: difference;
      transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cursor-dot.pulse { width: 12px; height: 12px; background-color: #fff; }

    /* DYNAMIC TITLES */
    .dyn-title {
      display: inline-block; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .dyn-title:hover { transform: translate(-4px, -4px); text-shadow: 4px 4px 0 #c00; }
    .outline-text:hover { -webkit-text-stroke: 1.5px #fff !important; }

    /* HEADER SYSTEM */
    header { position: sticky; top: 0; z-index: 500; height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; border-bottom: 2px solid #111; background: #fff; }
    .glass-nav { background: rgba(255, 255, 255, 0.65) !important; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
    
    .user-menu-container { position: relative; }
    .user-badge { background: #111; color: #fff; border: 2px solid #111; padding: 6px 14px; font-size: 9px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .user-dropdown { position: absolute; top: 100%; right: 0; background: #fff; border: 2px solid #111; border-top: none; display: none; flex-direction: column; min-width: 130px; box-shadow: 4px 4px 0 #000; }
    .user-menu-container:hover .user-dropdown { display: flex; }
    .user-dropdown-btn { background: transparent; color: #111; border: none; padding: 12px 16px; font-size: 9px; font-weight: 700; text-transform: uppercase; text-align: left; }
    .user-dropdown-btn:hover { background: #111; color: #fff; }

    .nav-signin { background: #111; color: #fff; border: 2px solid #111; padding: 6px 14px; font-size: 9px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
    .size-btn { background: transparent; color: #111; border: 1.5px solid #111; width: 34px; height: 34px; font-size: 10px; font-weight: 700; transition: all 0.2s; }
    .size-btn.active { background: #111; color: #fff; }

    .grain-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; opacity: 0.15; background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E'); }
    .hero-h1 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(90px, 18vw, 260px); color: var(--W); text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.85; mix-blend-mode: difference; }
    .nl { position: relative; color: #111; text-decoration: none; font-weight: 700; font-size: 10px; letter-spacing: 0.18em; }
    .nl::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #111; transition: width 0.2s; }
    .nl:hover::after { width: 100%; }

    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #fff; } ::-webkit-scrollbar-thumb { background: #111; }
    @media (max-width: 768px) { .desk-nav { display: none !important; } .product-grid { grid-template-columns: 1fr 1fr !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const LOGO_SRC = "splotchnobg.png";

    function CustomCursor() {
      const [pulse, setPulse] = useState(false);
      const [pos, setPos] = useState({ x: 0, y: 0 });
      useEffect(() => {
        const move = (e) => setPos({ x: e.clientX, y: e.clientY });
        const down = () => setPulse(true);
        const up = () => setPulse(false);
        window.addEventListener('mousemove', move);
        window.addEventListener('mousedown', down);
        window.addEventListener('mouseup', up);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mousedown', down); window.removeEventListener('mouseup', up); };
      }, []);
      return ( <div className={`cursor-dot ${pulse ? 'pulse' : ''}`} style={{ left: `${pos.x}px`, top: `${pos.y}px` }}></div> );
    }

    function ScrollProgress(){
      const [w,setW]=useState(0);
      useEffect(()=>{
        const fn=()=>setW((window.scrollY/(document.body.scrollHeight-window.innerHeight))*100);
        window.addEventListener("scroll",fn);
        return ()=>window.removeEventListener("scroll",fn);
      },[]);
      return <div style={{ position:"fixed",top:0,left:0,height:3,width:w+"%",background:"#111",zIndex:999 }}/>;
    }

    function Ticker(){
      const d=["STYLE BEYOND SEASONS","—","NEW DROP: TERRAIN SERIES","—","MADE IN INDIA","—","LIMITED RUNS. NO RESTOCKS.","—"];
      return(
        <div style={{ background:"#111",height:28,overflow:"hidden",display:"flex",alignItems:"center",borderBottom:"2px solid #222", position: "sticky", top: 48, zIndex: 499 }}>
          <div style={{ display:"flex",animation:"ticker 32s linear infinite",whiteSpace:"nowrap" }}>
            {[...d,...d,...d].map((t,i)=>(<span key={i} style={{ marginRight:"2rem",fontSize:9,fontWeight:700,letterSpacing:"0.25em",textTransform:"uppercase",color:"rgba(255,255,255,0.45)",flexShrink:0 }}>{t}</span>))}
          </div>
        </div>
      );
    }

    function Header({cartCount, onCartOpen, onLogoClick, user, onAuthClick, handleLogout}){
      const safeName = user ? (user.displayName || user.email || 'USER').split('@')[0].toUpperCase() : '';
      return(
        <header className="glass-nav">
          <button onClick={onLogoClick} style={{ background:"none", border:"none", overflow:"visible", paddingLeft: "10px" }}>
            <img src="SplotchPlainLogo-removebg.png" alt="Splotch" style={{ height:32, transform:"scale(1.8)", transformOrigin:"left center" }}/>
          </button>
          <nav className="desk-nav" style={{ display:"flex", gap:"2.5rem" }}>
            <button onClick={()=>document.getElementById("home")?.scrollIntoView({behavior:"smooth"})} className="nl" style={{background:"none",border:"none"}}>HOME</button>
            <button onClick={()=>document.getElementById("shop")?.scrollIntoView({behavior:"smooth"})} className="nl" style={{background:"none",border:"none"}}>SHOP</button>
            <a href="/about" className="nl">ABOUT</a>
            <button onClick={()=>document.getElementById("contact")?.scrollIntoView({behavior:"smooth"})} className="nl" style={{background:"none",border:"none"}}>CONTACT</button>
          </nav>
          <div style={{ display:"flex", alignItems:"center", gap:"1rem" }}>
            {user ? (
              <div className="user-menu-container">
                <div className="user-badge">{safeName} ▼</div>
                <div className="user-dropdown">
                  <button className="user-dropdown-btn" onClick={handleLogout}>Logout</button>
                </div>
              </div>
            ) : ( <button className="nav-signin" onClick={onAuthClick}>SIGN IN</button> )}
            <button onClick={onCartOpen} style={{ background:"#111", color:"#fff", padding:"7px 16px", fontSize:9, fontWeight:900, display:"flex", gap:6, border:"2px solid #111" }}>
              CART {cartCount>0 && <span style={{background:"#fff",color:"#111",padding:"0 4px"}}>{cartCount}</span>}
            </button>
          </div>
        </header>
      );
    }

    function ProdCard({product,onAdd}){
      const isSoldOut = product.stock <= 0; 
      const sizeArray = product.sizes ? product.sizes.split(',').map(s=>s.trim()) : ["OS"];
      const [selSize, setSelSize] = useState(sizeArray[0]);
      return(
        <div className="prod-card" style={{ border:"2px solid #111", background:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
          {isSoldOut&&<div style={{ position:"absolute",inset:0,zIndex:20,background:"rgba(255,255,255,0.85)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#c00" }}>SOLD OUT</div>}
          <div style={{ aspectRatio:"3/4", overflow:"hidden" }}>
            <img src={product.frontImage} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
          </div>
          <div style={{ padding:"1.2rem", borderTop:"2px solid #111" }}>
            <div style={{ fontWeight:900,fontSize:15,textTransform:"uppercase" }}>{product.name}</div>
            <div style={{ fontWeight:700,fontSize:13,margin:"5px 0 12px" }}>{product.price}</div>
            <div style={{ display:"flex", gap:"5px", marginBottom:"1rem" }}>
              {sizeArray.map(s => (
                <button key={s} onClick={()=>setSelSize(s)} className={`size-btn ${selSize===s?'active':''}`}>{s}</button>
              ))}
            </div>
            <button className="prod-cta-btn" disabled={isSoldOut} onClick={()=>onAdd({...product, selectedSize: selSize})} style={{ width:"100%", background:"#fff", color:"#111", border:"2px solid #111", padding:"10px", fontSize:10, fontWeight:900 }}>ADD TO CART</button>
          </div>
        </div>
      );
    }

    function CartSidebar({cart,setCart,onClose, user, onAuthClick}){
      const total = cart.reduce((s,i)=>s+(parseInt((i.price||"0").replace(/[^0-9]/g,""))||0),0);
      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState('cart'); 
      const [shipping, setShipping] = useState({ phone: "", address: "", city: "", state: "", pincode: "" });

      const processPayment = async () => {
        if (!shipping.phone || !shipping.address) { alert("Fill all details."); return; }
        setLoading(true);
        try {
          const response = await fetch('/api/createOrder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: total }) });
          const data = await response.json();
          const options = {
            key: data.keyId, amount: total * 100, currency: "INR", name: "Splotch", order_id: data.orderId,
            handler: async function (rzpRes) {
              await window.fbAddDoc(window.fbCollection(window.fbDb, "orders"), { items: cart, total, shipping, timestamp: new Date() });
              for (const item of cart) {
                if(item.id) await window.fbUpdateDoc(window.fbDoc(window.fbDb, "products", item.id), { stock: window.fbIncrement(-1) });
              }
              alert("Order placed!"); setCart([]); onClose();
            },
            prefill: { email: user.email }, theme: { color: "#111111" }
          };
          new window.Razorpay(options).open();
        } catch (err) { alert(err.message); } finally { setLoading(false); }
      };

      return(
        <div style={{ position:"fixed",inset:0,zIndex:800 }}>
          <div onClick={onClose} style={{ position:"absolute",inset:0,background:"rgba(17,17,17,0.55)" }}/>
          <div style={{ position:"absolute",top:0,right:0,bottom:0,width:"100%",maxWidth:400,background:"#fff",borderLeft:"3px solid #111",display:"flex",flexDirection:"column" }}>
            <div style={{ padding:"1.2rem 1.8rem",borderBottom:"2px solid #111",display:"flex",justifyContent:"space-between" }}>
              <span style={{ fontWeight:900 }}>{step === 'cart' ? 'CART' : 'SHIPPING'}</span>
              <button onClick={onClose} style={{ background:"none",border:"none",fontWeight:900 }}>✕</button>
            </div>
            {step === 'cart' ? (
              <div style={{ flex:1, overflow:"auto", padding:"1rem" }}>
                {cart.map((item,i)=>(
                  <div key={i} style={{ display:"flex",gap:"1rem",padding:"10px 0",borderBottom:"1px solid #eee" }}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:900,fontSize:12}}>{item.name}</div>
                      <div style={{fontSize:10}}>SIZE: {item.selectedSize}</div>
                    </div>
                    <button onClick={()=>setCart(c=>c.filter((_,j)=>j!==i))}>✕</button>
                  </div>
                ))}
                {cart.length > 0 && <button onClick={()=>user ? setStep('shipping') : onAuthClick()} style={{width:"100%",background:"#111",color:"#fff",padding:"15px",marginTop:"2rem",fontWeight:900}}>CHECKOUT →</button>}
              </div>
            ) : (
              <div style={{ padding:"1.5rem" }}>
                <input placeholder="Phone" onChange={e=>setShipping({...shipping, phone:e.target.value})} style={{width:"100%",padding:"12px",marginBottom:"1rem",border:"2px solid #111"}}/>
                <input placeholder="Address" onChange={e=>setShipping({...shipping, address:e.target.value})} style={{width:"100%",padding:"12px",marginBottom:"1rem",border:"2px solid #111"}}/>
                <button onClick={processPayment} disabled={loading} style={{width:"100%",background:"#111",color:"#fff",padding:"15px",fontWeight:900}}>{loading ? "..." : "PAY NOW"}</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function AdminPanel({products,onClose}){
      const [authed,setAuthed]=useState(false);
      const [creds,setCreds]=useState({email:"",pw:""});
      const [tab,setTab]=useState("products");
      const [orders,setOrders]=useState([]);
      const [editId,setEditId]=useState(null);
      const [form,setForm]=useState({name:"",price:"₹1,200",stock:10,sizes:"S,M,L,XL",frontImage:""});

      useEffect(() => {
        if(authed && tab==="orders") window.fbGetDocs(window.fbCollection(window.fbDb,"orders")).then(s=>{
          const o=[]; s.forEach(d=>o.push(d.data())); setOrders(o);
        });
      }, [authed, tab]);

      const login=async()=>{
        try {
          const res = await window.fbSignInWithEmailAndPassword(window.fbAuth, creds.email, creds.pw);
          if(res.user.email === "splotchglobal@gmail.com") setAuthed(true);
        } catch(e){alert(e.message);}
      };

      const save=async()=>{
        const id = editId==="new" ? "p-"+Date.now() : editId;
        try { await window.fbSetDoc(window.fbDoc(window.fbDb,"products",id), {...form, id}); alert("Saved!"); window.location.reload(); }
        catch(e){alert(e.message);}
      };

      if(!authed) return (
        <div style={{ position:"fixed",inset:0,zIndex:2000,background:"#111",display:"flex",alignItems:"center",justifyContent:"center" }}>
           <div style={{ background:"#fff",padding:"2rem",border:"3px solid #111",width:350 }}>
              <h2 style={{fontFamily:"Playfair Display"}}>Admin Access</h2>
              <input type="email" placeholder="Email" onChange={e=>setCreds({...creds,email:e.target.value})} style={{width:"100%",padding:"10px",margin:"10px 0",border:"2px solid #111"}}/>
              <input type="password" placeholder="Password" onChange={e=>setCreds({...creds,pw:e.target.value})} style={{width:"100%",padding:"10px",margin:"10px 0",border:"2px solid #111"}}/>
              <button onClick={login} style={{width:"100%",padding:"12px",background:"#111",color:"#fff",fontWeight:900}}>UNLOCK</button>
           </div>
        </div>
      );

      return (
        <div style={{ position:"fixed",inset:0,zIndex:2000,background:"#fff",overflow:"auto",padding:"2rem" }}>
          <div style={{display:"flex",gap:"1rem",borderBottom:"2px solid #111",paddingBottom:"1rem",marginBottom:"2rem"}}>
            <button onClick={()=>setTab("products")} style={{fontWeight:900}}>PRODUCTS</button>
            <button onClick={()=>setTab("orders")} style={{fontWeight:900}}>ORDERS</button>
            <button onClick={onClose} style={{marginLeft:"auto"}}>CLOSE</button>
          </div>
          {tab==="products" ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2rem"}}>
               <div>
                  {products.map(p=>(<div key={p.id} onClick={()=>{setForm(p);setEditId(p.id)}} style={{padding:"10px",border:"1px solid #ddd",marginBottom:"5px"}}>{p.name}</div>))}
                  <button onClick={()=>{setForm({});setEditId("new")}} style={{marginTop:"1rem",fontWeight:900}}>+ ADD NEW</button>
               </div>
               {editId && (
                 <div style={{border:"2px solid #111",padding:"1.5rem"}}>
                    <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Name" style={{width:"100%",padding:"10px",marginBottom:"10px"}}/>
                    <input value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder="Price" style={{width:"100%",padding:"10px",marginBottom:"10px"}}/>
                    <input type="number" value={form.stock} onChange={e=>setForm({...form,stock:parseInt(e.target.value)})} placeholder="Stock" style={{width:"100%",padding:"10px",marginBottom:"10px"}}/>
                    <input value={form.sizes} onChange={e=>setForm({...form,sizes:e.target.value})} placeholder="Sizes (S, M, L)" style={{width:"100%",padding:"10px",marginBottom:"10px"}}/>
                    <input value={form.frontImage} onChange={e=>setForm({...form,frontImage:e.target.value})} placeholder="Image URL" style={{width:"100%",padding:"10px",marginBottom:"10px"}}/>
                    <button onClick={save} style={{width:"100%",background:"#111",color:"#fff",padding:"12px",fontWeight:900}}>SAVE CHANGES</button>
                 </div>
               )}
            </div>
          ) : (
            <div>
              {orders.map((o,i)=>(
                <div key={i} style={{border:"2px solid #111",padding:"1rem",marginBottom:"1rem"}}>
                  <strong>{o.userName} - ₹{o.total}</strong><br/>
                  {o.shipping?.address}, {o.shipping?.city} | {o.shipping?.phone}<br/>
                  <small>{o.items.map(it=>`${it.name}(${it.selectedSize})`).join(", ")}</small>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App(){
      const [products,setProducts]=useState([]); 
      const [cart,setCart]=useState([]);
      const [adminOpen,setAdminOpen]=useState(false);
      const [cartOpen,setCartOpen]=useState(false);
      const [authOpen,setAuthOpen]=useState(false);
      const [user, setUser]=useState(null);

      useEffect(() => {
        window.fbOnAuthStateChanged(window.fbAuth, u => setUser(u));
        window.fbGetDocs(window.fbCollection(window.fbDb,"products")).then(s=>{
          const p=[]; s.forEach(d=>p.push(d.data())); setProducts(p);
        });
      }, []);

      const submitMsg = async (e) => {
        e.preventDefault();
        const f = e.target;
        try {
          await window.fbAddDoc(window.fbCollection(window.fbDb,"messages"), {name:f.nm.value, email:f.em.value, msg:f.ms.value});
          alert("Sent!"); f.reset();
        } catch(e){alert(e.message);}
      };

      return(
        <div style={{ minHeight:"100vh" }}>
          <CustomCursor /><ScrollProgress />
          <Header cartCount={cart.length} onCartOpen={()=>setCartOpen(true)} onLogoClick={()=>setAdminOpen(true)} user={user} onAuthClick={()=>setAuthOpen(true)} handleLogout={()=>window.fbSignOut(window.fbAuth)} />
          <Ticker/>
          
          <section id="home" style={{ height:"80vh", background:"#111", display:"grid", placeItems:"center" }}>
            <h1 className="hero-h1">SPLOTCH</h1>
          </section>

          <section id="shop" style={{ padding:"6rem 2rem" }}>
            <SLabel>SS'26 COLLECTION</SLabel>
            <h2 className="dyn-title" style={{ fontFamily:"Playfair Display", fontSize:"clamp(50px,8vw,100px)", marginBottom:"3rem" }}>The Collection.</h2>
            <div className="product-grid" style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"2rem" }}>
              {products.map(p => <ProdCard key={p.id} product={p} onAdd={i=>setCart([...cart, i])}/>)}
            </div>
          </section>

          <section id="work" style={{ padding:"6rem 2rem", background:"#f9f9f9" }}>
             <SLabel>PORTFOLIO</SLabel>
             <h2 className="dyn-title" style={{ fontFamily:"Playfair Display", fontSize:"clamp(40px,6vw,80px)", marginBottom:"3rem" }}>The Work.</h2>
             <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"10px"}}>
                {[1,2,3,4,5,6].map(i=>(<div key={i} style={{aspectRatio:"1/1", background:"#eee", border:"2px solid #111"}}></div>))}
             </div>
          </section>

          <section id="contact" style={{ padding:"6rem 2rem", background:"#111", color:"#fff" }}>
            <h2 className="dyn-title" style={{ fontSize:60, marginBottom:"2rem", fontStyle:"italic" }}>Contact.</h2>
            <form onSubmit={submitMsg} style={{maxWidth:600}}>
              <input name="nm" placeholder="NAME" style={{width:"100%",background:"none",border:"none",borderBottom:"2px solid #333",padding:"15px",color:"#fff"}}/>
              <input name="em" placeholder="EMAIL" style={{width:"100%",background:"none",border:"none",borderBottom:"2px solid #333",padding:"15px",color:"#fff"}}/>
              <textarea name="ms" placeholder="MESSAGE" style={{width:"100%",background:"none",border:"none",borderBottom:"2px solid #333",padding:"15px",color:"#fff",marginTop:"1rem"}}/>
              <button type="submit" style={{marginTop:"2rem",padding:"15px 40px",background:"#fff",color:"#111",fontWeight:900}}>SEND →</button>
            </form>
          </section>

          <footer style={{ padding:"4rem 2rem", background:"#111", color:"#fff", textAlign:"center" }}>
            <h2 className="dyn-title outline-text" style={{ fontFamily:"Playfair Display", fontSize:"clamp(50px,8vw,100px)", color:"transparent", WebkitTextStroke:"1px #555", marginBottom:"3rem" }}>Predict the future,<br/>don't stop now.</h2>
            <p>© 2026 Splotch. // Created by dudefromalhiem</p>
          </footer>

          {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onSuccess={()=>setAuthOpen(false)}/>}
          {adminOpen && <AdminPanel products={products} onClose={()=>setAdminOpen(false)}/>}
          {cartOpen && <CartSidebar cart={cart} setCart={setCart} onClose={()=>setCartOpen(false)} user={user} onAuthClick={()=>setAuthOpen(true)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
