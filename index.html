<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splotch Website</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-type="module"></script>
  
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      onAuthStateChanged, 
      signOut,
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword    
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-functions.js";

    /* =====================================================================
       🔥 1. ADD YOUR FIREBASE CONFIGURATION HERE 🔥
       ===================================================================== */
    const firebaseConfig = {
      apiKey: "AIzaSyCVoLUST_wVF39G2KLHGxWIBEEParYx4Do",
      authDomain: "studio-5892990360-b2d20.firebaseapp.com",
      projectId: "studio-5892990360-b2d20",
      storageBucket: "studio-5892990360-b2d20.firebasestorage.app",
      messagingSenderId: "460071447788",
      appId: "1:460071447788:web:c98f0c4be596aa0a6d09c9"

    try {
      const app = initializeApp(firebaseConfig);
      window.fbDb = getFirestore(app);

  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
    :root { --B: #111111; --W: #FFFFFF; }
    html { scroll-behavior: smooth; }
    body { background: var(--W); color: var(--B); font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: crosshair; }
    ::selection { background: var(--B); color: var(--W); }
    input, textarea, select, button { font-family: inherit; border-radius: 0 !important; outline: none; }

    /* ═══════ GRAIN OVERLAY ═══════ */
    .grain-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; 
      /* Reduced opacity from 0.35 to 0.15 */
      opacity: 0.15;
      /* Changed baseFrequency from 0.8 to 1.5 to make grains smaller */
      background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

    /* ═══════ HEADER & AUTH UI ═══════ */
    header {
      position: sticky; top: 0; z-index: 500; height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; border-bottom: 2px solid #111; background: #fff; transition: box-shadow 0.3s, background 0.3s, backdrop-filter 0.3s;
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.65) !important; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); box-shadow: 0 2px 0 #111;
    }
    .nav-signin {
      background: #111; color: #fff; border: 2px solid #111; padding: 9px 18px; font-size: 10px; font-weight: 900; 
      letter-spacing: 0.18em; text-transform: uppercase; transition: all 0.2s; cursor: crosshair;
    }
    .nav-signin:hover { background: transparent; color: #111; }
    .user-badge {
      background: #111; color: #fff; border: 2px solid #111; padding: 7px 14px; font-size: 9px; font-weight: 900; 
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .nav-logout {
      background: transparent; color: #111; border: none; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; 
      text-transform: uppercase; cursor: crosshair; text-decoration: underline; text-underline-offset: 3px; transition: opacity 0.2s;
    }
    .nav-logout:hover { opacity: 0.5; }
    .auth-container { display: flex; align-items: center; gap: 1rem; }

    /* ═══════ TOPOGRAPHIC PARALLAX ═══════ */
    .topo-parallax-wrap {
      position: absolute; top: -50vh; bottom: -50vh; left: 0; right: 0; pointer-events: none; z-index: 0;
      transform: translateY(calc(var(--scroll-y, 0) * 0.15px)); will-change: transform;
    }

    /* Hero Styles */
    .hero-video-placeholder { position: absolute; inset: 0; background: var(--B); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
    .hero-video-placeholder::before { content: ''; position: absolute; inset: -60px; background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.04) 39px, rgba(255,255,255,0.04) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.04) 39px, rgba(255,255,255,0.04) 40px); }
    .hero-text-overlay { position: absolute; z-index: 3; top: 32%; left: -2%; line-height: 0.85; pointer-events: none; -webkit-user-select: none; user-select: none; }
    .hero-h1 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(90px, 18vw, 260px); color: var(--W); text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.85; mix-blend-mode: difference; }
    .hero-sub { position: absolute; z-index: 4; top: 2.5rem; right: 2rem; text-align: right; pointer-events: none; }
    .hero-sub p { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--W); line-height: 2; opacity: 0.7; }
    .hero-badge { display: inline-block; border: 2px solid var(--W); font-size: 10px; font-weight: 700; letter-spacing: 0.2em; padding: 6px 12px; color: var(--W); text-transform: uppercase; margin-top: 1rem; }

    /* Flip Cards & Animations */
    .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.65s cubic-bezier(0.76, 0, 0.24, 1); transform-style: preserve-3d; }
    .flipped .flip-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { position: absolute; inset: 0; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    .reveal { opacity: 0; transform: translateY(44px); transition: opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1), transform 0.75s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.1s; } .reveal-d2 { transition-delay: 0.22s; } .reveal-d3 { transition-delay: 0.34s; } .reveal-d4 { transition-delay: 0.46s; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* Components */
    .prod-card { transition: box-shadow 0.25s, transform 0.25s; }
    .prod-card:hover { box-shadow: 6px 6px 0 #111; transform: translate(-2px, -2px); }
    .prod-cta-btn, .flip-toggle { transition: background 0.2s, color 0.2s; }
    .prod-cta-btn:hover, .flip-toggle:hover { background: #111 !important; color: #fff !important; }
    .hl-card .hl-caption { opacity: 0; transform: translateY(12px); transition: opacity 0.35s ease, transform 0.35s ease; }
    .hl-card:hover .hl-caption { opacity: 1; transform: translateY(0); }
    .port-card .port-overlay { opacity: 0; transition: opacity 0.3s ease; }
    .port-card:hover .port-overlay { opacity: 1; }
    .port-card .port-text { transform: translateY(10px); opacity: 0; transition: transform 0.4s ease, opacity 0.4s ease; }
    .port-card:hover .port-text { transform: translateY(0); opacity: 1; }
    .svc-card { transition: background 0.25s, color 0.25s; }
    .svc-card:hover { background: #111 !important; color: #fff !important; }
    .svc-card:hover .svc-num { color: rgba(255, 255, 255, 0.07) !important; }
    .svc-card:hover .svc-tag { color: rgba(255, 255, 255, 0.35) !important; border-color: rgba(255, 255, 255, 0.15) !important; }
    .svc-card:hover .svc-btn { background: #fff !important; color: #111 !important; border-color: #fff !important; }
    .nl { position: relative; }
    .nl::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #111; transition: width 0.2s; }
    .nl:hover::after { width: 100%; }
    .back-btn { transition: background 0.2s, color 0.2s, transform 0.2s; }
    .back-btn:hover { background: #111 !important; color: #fff !important; transform: translateX(-3px); }
    .admin-input:focus, .drop-zone.over { border-color: #111 !important; }
    .drop-zone.over { background: rgba(0, 0, 0, 0.04) !important; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #fff; } ::-webkit-scrollbar-thumb { background: #111; }

    @media (max-width: 768px) {
      .desk-nav { display: none !important; }
      .mob-ham { display: flex !important; }
      .product-grid, .port-grid { grid-template-columns: 1fr 1fr !important; }
      .three-col, .two-col, .footer-grid, .admin-form-grid, .contact-grid, .testi-grid, .about-grid { grid-template-columns: 1fr !important; }
      .hero-h1 { font-size: clamp(80px, 22vw, 130px); }
    }
    @media (min-width: 769px) { .mob-ham, .mob-menu { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const LOGO_SRC = "splotchnobg.png";

    const TopoSVG = ({ color="#111", style={} }) => (
      <svg viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style={{ width:"100%",height:"100%",...style }}>
        {["M0,250 Q150,220 300,250 T600,235 T900,248 T1200,238", "M0,270 Q130,242 260,270 T520,255 T780,268 T1040,252 T1200,265", "M0,230 Q170,202 340,230 T680,217 T1020,228 T1200,220", "M0,290 Q110,264 220,290 T440,276 T660,290 T880,272 T1100,288 T1200,282", "M0,210 Q190,183 380,210 T760,198 T1140,208 T1200,203", "M0,310 Q90,284 180,310 T360,295 T540,311 T720,293 T900,310 T1100,292 T1200,308"].map((d,i)=>( <path key={i} d={d} fill="none" stroke={color} strokeWidth={i<2?1:0.65}/> ))}
        <ellipse cx="300" cy="250" rx="240" ry="65" fill="none" stroke={color} strokeWidth="0.75"/>
        <ellipse cx="300" cy="250" rx="160" ry="42" fill="none" stroke={color} strokeWidth="0.75"/>
        <ellipse cx="300" cy="250" rx="80"  ry="20" fill="none" stroke={color} strokeWidth="0.75"/>
        <ellipse cx="900" cy="245" rx="200" ry="55" fill="none" stroke={color} strokeWidth="0.75"/>
        <ellipse cx="900" cy="245" rx="130" ry="35" fill="none" stroke={color} strokeWidth="0.75"/>
        <ellipse cx="900" cy="245" rx="60"  ry="16" fill="none" stroke={color} strokeWidth="0.75"/>
      </svg>
    );

    const STORAGE_KEY = "splotch_products_v6";
    const DEFAULT_PRODUCTS = [
      { id:"shirt-1", name:"Terrain Tee 001", cost:"₹450", price:"₹1,299", tag:"New Drop", description:"Urban utility tee with topographic print detail. Oversized fit, 100% organic cotton.", frontImage:"Shirt 1 front.jpeg", backImage:"Shirt 1 back.jpeg", hasBack:true, soldOut:false, category:"T-Shirts" },
      { id:"shirt-2", name:"Grid Tee 002", cost:"₹500", price:"₹1,499", tag:"Limited", description:"Graphic techwear tee from the Grid Zero collaboration. Heavyweight cotton blend.", frontImage:"Shirt 2 front.jpeg", backImage:"Shirt 2 back.jpeg", hasBack:true, soldOut:false, category:"T-Shirts" },
      { id:"shirt-3", name:"Shadow Tee 003", cost:"₹400", price:"₹1,199", tag:"Last 5", description:"Minimalist dropped-shoulder tee. Shadow Series print, ultra-soft jersey.", frontImage:"Shirt 3 front.jpeg", backImage:"Shirt 3 back.jpeg", hasBack:false, soldOut:false, category:"T-Shirts" },
    ];
    function loadProducts(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch{} return DEFAULT_PRODUCTS; }
    function saveProducts(p){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(p)); }catch{} }

    const SLabel = ({children,inv=false})=>(
      <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.32em",textTransform:"uppercase", marginBottom:"1.8rem",borderLeft:`3px solid ${inv?"#fff":"#111"}`, paddingLeft:10,color:inv?"rgba(255,255,255,0.45)":"rgba(0,0,0,0.45)" }}>{children}</div>
    );

    const ImgPlaceholder = ({label,dark=true})=>(
      <div style={{ width:"100%",height:"100%",background:dark?"#1a1a1a":"#efefef", display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center", gap:10,position:"relative",overflow:"hidden" }}>
        <div style={{ position:"absolute",inset:0,opacity:0.1 }}><TopoSVG color={dark?"#fff":"#111"}/></div>
        <span style={{ fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase", color:dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.25)",position:"relative",zIndex:1 }}>{label}</span>
      </div>
    );

    const BackButton = ({onBack,label="Back"})=>(
      <button className="back-btn" onClick={onBack} style={{ position:"fixed",top:110,left:"1.5rem",zIndex:400, display:"flex",alignItems:"center",gap:10, background:"rgba(255,255,255,0.95)",color:"#111", border:"2px solid #111",padding:"10px 18px", fontSize:10,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase", cursor:"crosshair",backdropFilter:"blur(8px)", boxShadow:"3px 3px 0 #111" }}>
        <svg width="16" height="10" viewBox="0 0 16 10" fill="none"><path d="M5 1L1 5L5 9" stroke="currentColor" strokeWidth="1.8" strokeLinecap="square"/><line x1="1" y1="5" x2="15" y2="5" stroke="currentColor" strokeWidth="1.8"/></svg>
        {label}
      </button>
    );

    function ScrollProgress(){
      const [w,setW]=useState(0);
      useEffect(()=>{
        const fn=()=>setW((window.scrollY/(document.body.scrollHeight-window.innerHeight))*100);
        window.addEventListener("scroll",fn,{passive:true});
        return ()=>window.removeEventListener("scroll",fn);
      },[]);
      return <div style={{ position:"fixed",top:0,left:0,height:3,width:w+"%",background:"#111",zIndex:999,transition:"width .1s linear" }}/>;
    }

    function Ticker(){
      const items=["STYLE BEYOND SEASONS","—","NEW DROP: TERRAIN SERIES","—","MADE IN INDIA","—","LIMITED RUNS. NO RESTOCKS.","—","splotch.in","—"];
      const d=[...items,...items];
      return(
        <div style={{ background:"#111",height:28,overflow:"hidden",display:"flex",alignItems:"center",borderBottom:"2px solid #222", position: "sticky", top: 56, zIndex: 499 }}>
          <div style={{ display:"flex",animation:"ticker 32s linear infinite",whiteSpace:"nowrap" }}>
            {d.map((t,i)=>(<span key={i} style={{ marginRight:"2rem",fontSize:9,fontWeight:700,letterSpacing:"0.25em",textTransform:"uppercase",color:"rgba(255,255,255,0.45)",flexShrink:0 }}>{t}</span>))}
          </div>
        </div>
      );
    }

    function Header({cartCount, onCartOpen, onLogoClick, setMobMenu, user, handleAuth}){
      const [scrolled,setScrolled]=useState(false);
      useEffect(()=>{
        const fn=()=>setScrolled(window.scrollY>30);
        window.addEventListener("scroll",fn,{passive:true});
        return ()=>window.removeEventListener("scroll",fn);
      },[]);

      const scrollTo=(id)=>{ document.getElementById(id)?.scrollIntoView({behavior:"smooth"}); };

      return(
        <header className={scrolled ? "glass-nav" : ""}>
          <button onClick={onLogoClick} style={{ background:"none",border:"none",cursor:"crosshair", display:"flex",alignItems:"center",gap:10,padding:0, position:"relative" }}>
            <img src={LOGO_SRC} alt="Splotch" style={{ height:36,width:"auto",display:"block",filter:"invert(0)" }}/>
          </button>
          
          <nav className="desk-nav" style={{ display:"flex",gap:"2rem",alignItems:"center" }}>
            {[["home","Home"],["shop","Shop"],["about","About"],["contact","Contact"]].map(([id,label])=>(
              <button key={id} onClick={()=>scrollTo(id)} className="nl" style={{ background:"none",border:"none",cursor:"crosshair", fontSize:10,fontWeight:700,letterSpacing:"0.18em", textTransform:"uppercase",color:"#111" }}>{label}</button>
            ))}
          </nav>
          
          <div style={{ display:"flex",alignItems:"center",gap:"1.2rem" }}>
            <div className="auth-container desk-nav">
              {user ? (
                <React.Fragment>
                  <div className="user-badge">WELCOME, {user.displayName ? user.displayName.split(' ')[0].toUpperCase() : 'USER'}</div>
                  <button className="nav-logout" onClick={handleAuth}>LOGOUT</button>
                </React.Fragment>
              ) : (
                <button className="nav-signin" onClick={handleAuth}>SIGN IN</button>
              )}
            </div>

            <button className="mob-ham" onClick={()=>setMobMenu(o=>!o)} style={{ background:"none",border:"2px solid #111", width:38,height:38,cursor:"crosshair", flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5 }}>
              {[0,1,2].map(i=><span key={i} style={{ display:"block",width:16,height:1.5,background:"#111" }}/>)}
            </button>

            <button onClick={onCartOpen} style={{ background:"#111",color:"#fff",border:"2px solid #111", padding:"8px 14px",fontSize:10,fontWeight:700, letterSpacing:"0.15em",textTransform:"uppercase",cursor:"crosshair", display:"flex",alignItems:"center",gap:6 }}>
              Cart
              {cartCount>0&&<span style={{ background:"#fff",color:"#111",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900 }}>{cartCount}</span>}
            </button>
          </div>
        </header>
      );
    }

    function MobMenu({open, setOpen, user, handleAuth}){
      const go=(id)=>{ document.getElementById(id)?.scrollIntoView({behavior:"smooth"}); setOpen(false); };
      return(
        <div className="mob-menu" style={{ position:"fixed",inset:0,zIndex:600,background:"#111", display:"flex",flexDirection:"column",justifyContent:"center",padding:"3rem 2rem", transform:open?"translateX(0)":"translateX(100%)", transition:"transform .4s cubic-bezier(.76,0,.24,1)" }}>
          <button onClick={()=>setOpen(false)} style={{ position:"absolute",top:16,right:16, background:"none",border:"2px solid rgba(255,255,255,0.2)", width:42,height:42,color:"#fff",fontSize:18,fontWeight:700,cursor:"crosshair" }}>✕</button>
          <img src={LOGO_SRC} alt="Splotch" style={{ height:48,width:"auto",marginBottom:"2.5rem",opacity:0.9,filter:"invert(1)" }}/>
          {[["home","Home"],["shop","Shop"],["about","About"],["contact","Contact"]].map(([id,label],i)=>(
            <button key={id} onClick={()=>go(id)} style={{ background:"none",border:"none",textAlign:"left",fontFamily:"Inter",fontWeight:900, fontSize:"clamp(38px,10vw,60px)",letterSpacing:"-0.04em",textTransform:"uppercase", color:"#fff",cursor:"crosshair",lineHeight:1.1, borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"0.5rem 0" }}>{label}</button>
          ))}
          
          <div style={{ marginTop: '2rem', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '2rem' }}>
            {user ? (
              <React.Fragment>
                <span style={{ color: '#fff', fontSize: 12, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', display: 'block', marginBottom: '1rem' }}>
                    WELCOME, {user.displayName ? user.displayName.split(' ')[0].toUpperCase() : 'USER'}
                </span>
                <button onClick={() => { handleAuth(); setOpen(false); }} style={{ background: 'transparent', color: '#fff', border: '1px solid #fff', padding: '10px 20px', fontSize: 10, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', cursor: 'crosshair' }}>Logout</button>
              </React.Fragment>
            ) : (
                <button onClick={() => { handleAuth(); setOpen(false); }} style={{ background: '#fff', color: '#111', border: 'none', padding: '12px 24px', fontSize: 11, fontWeight: 900, letterSpacing: '0.15em', textTransform: 'uppercase', cursor: 'crosshair' }}>Sign In</button>
            )}
          </div>
        </div>
      );
    }

    function ProdCard({product,onQV,onAdd}){
      const [flipped,setFlipped]=useState(false);
      const [added,setAdded]=useState(false);
      const doAdd=(e)=>{ e.stopPropagation(); onAdd(product); setAdded(true); setTimeout(()=>setAdded(false),1800); };
      const frontImg = product.frontImage || null;
      const backImg = product.backImage || null;

      return(
        <div className="prod-card" style={{ border:"2px solid #111",background:"#fff",position:"relative" }}>
          {product.tag&&<div style={{ position:"absolute",top:12,left:12,zIndex:10,background:"#111",color:"#fff",fontSize:8,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",padding:"3px 8px" }}>{product.tag}</div>}
          {product.hasBack&&(
            <button className="flip-toggle" onClick={()=>setFlipped(f=>!f)} style={{ position:"absolute",top:12,right:12,zIndex:10, background:flipped?"#111":"rgba(255,255,255,0.92)", color:flipped?"#fff":"#111", border:"1.5px solid #111",fontSize:8,fontWeight:700, letterSpacing:"0.15em",textTransform:"uppercase", padding:"4px 9px",cursor:"crosshair",transition:"all .2s" }}>{flipped?"◀ Front":"Back ▶"}</button>
          )}
          {product.soldOut&&(
            <div style={{ position:"absolute",inset:0,zIndex:20,background:"rgba(255,255,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center" }}><span style={{ fontWeight:900,fontSize:16,letterSpacing:"0.1em",textTransform:"uppercase" }}>SOLD OUT</span></div>
          )}
          <div style={{ aspectRatio:"3/4",overflow:"hidden",perspective:"1200px" }} className={flipped?"flipped":""}>
            <div className="flip-inner">
              <div className="flip-front">{frontImg ? <img src={frontImg} alt="" onError={(e)=>{e.target.style.display='none'}} style={{ width:"100%",height:"100%",objectFit:"cover",display:"block" }}/> : <ImgPlaceholder label={product.name+" · Front"}/>}</div>

    function CartSidebar({cart,setCart,onClose, user}){
      const total = cart.reduce((s,i)=>s+(parseInt((i.price||"0").replace(/[^0-9]/g,""))||0),0);
      const [loading, setLoading] = useState(false);

      const handleCheckout = async () => {
        if (cart.length === 0) return;
        if (!window.fbFunctions || !window.fbHttpsCallable) { 
          alert("Firebase Functions not initialized. Cannot process checkout."); 
          return; 
        }

        setLoading(true);
        try {
          const createOrder = window.fbHttpsCallable(window.fbFunctions, 'createRzpOrder');
          const orderRes = await createOrder({ amount: total * 100 }); 
          const { order_id, key } = orderRes.data;

          const options = {
            key: key || "YOUR_RAZORPAY_KEY_ID", 
            amount: total * 100, 
            currency: "INR",
            name: "Splotch",
            description: "Apparel Order",
            image: LOGO_SRC,
            order_id: order_id,
            handler: async function (response) {
              try {
                const verifyPayment = window.fbHttpsCallable(window.fbFunctions, 'verifyRzpPayment');
                const verifyRes = await verifyPayment({
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature
                });

                if (verifyRes.data.success) {
                  await window.fbAddDoc(window.fbCollection(window.fbDb, "orders"), {
                    items: cart,
                    total: total,
                    paymentId: response.razorpay_payment_id,
                    orderId: response.razorpay_order_id,
                    userId: user ? user.uid : "guest",
                    userEmail: user ? user.email : "guest",
                    timestamp: new Date()
                  });
                  
                  alert("Payment successful! Order placed.");
                  setCart([]);
                  onClose();
                } else {
                  alert("Payment verification failed! Please contact support.");
                }
              } catch (err) {
                console.error("Verification Error:", err);
                alert("Error verifying payment.");
              }
            },
            theme: { color: "#111111" }
          };
          
          const rzp = new window.Razorpay(options);
          rzp.on('payment.failed', function (response){
            alert("Payment Failed: " + response.error.description);
          });
          rzp.open();

        } catch (err) {
          console.error("Checkout Request Error:", err);
          alert("Error initiating checkout. Please ensure Firebase Functions are deployed.");
        }
        setLoading(false);
      };

      return(
        <div style={{ position:"fixed",inset:0,zIndex:800 }}>
          <div onClick={onClose} style={{ position:"absolute",inset:0,background:"rgba(17,17,17,0.55)" }}/>
          <div style={{ position:"absolute",top:0,right:0,bottom:0,width:"100%",maxWidth:390,background:"#fff",borderLeft:"3px solid #111",display:"flex",flexDirection:"column" }}>
            <div style={{ padding:"1.2rem 1.8rem",borderBottom:"2px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ fontFamily:"Playfair Display",fontWeight:700,fontSize:20,letterSpacing:"-0.01em" }}>Cart ({cart.length})</span>
              <button onClick={onClose} style={{ background:"none",border:"1.5px solid #111",width:34,height:34,fontSize:14,cursor:"crosshair",fontWeight:700 }}>✕</button>
            </div>
            <div style={{ flex:1,overflow:"auto",padding:"0.8rem 1.8rem" }}>
              {cart.length===0?(
                <div style={{ textAlign:"center",padding:"4rem 0",color:"rgba(0,0,0,0.25)" }}>
                  <img src={LOGO_SRC} alt="" style={{ height:40,opacity:.15,marginBottom:12 }}/>
                  <div style={{ fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase" }}>Your cart is empty</div>
                </div>
              ):cart.map((item,i)=>(
                <div key={i} style={{ display:"flex",gap:"1rem",alignItems:"center",borderBottom:"1px solid rgba(0,0,0,0.07)",padding:"0.9rem 0" }}>
                  <div style={{ width:58,height:58,background:"#111",flexShrink:0,overflow:"hidden" }}>
                    {item.frontImage?<img src={item.frontImage} alt="" onError={(e)=>{e.target.style.display='none'}} style={{ width:"100%",height:"100%",objectFit:"cover" }}/>:<div style={{ width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.15)",fontSize:18 }}>◎</div>}
                  </div>
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:"0.03em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{item.name}</div>
                    <div style={{ fontSize:12,fontWeight:600,color:"rgba(0,0,0,0.45)",marginTop:2 }}>{item.price}</div>
                  </div>
                  <button onClick={()=>setCart(c=>c.filter((_,j)=>j!==i))} style={{ background:"none",border:"1px solid rgba(0,0,0,0.12)",width:26,height:26,fontSize:11,cursor:"crosshair",flexShrink:0 }}>✕</button>
                </div>
              ))}
            </div>
            {cart.length>0&&(
              <div style={{ padding:"1.2rem 1.8rem",borderTop:"2px solid #111" }}>
                <div style={{ display:"flex",justifyContent:"space-between",marginBottom:"0.9rem" }}>
                  <span style={{ fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase" }}>Total</span>
                  <span style={{ fontSize:17,fontWeight:900,letterSpacing:"-0.02em" }}>₹{total.toLocaleString("en-IN")}</span>
                </div>
                <button onClick={handleCheckout} disabled={loading} style={{ width:"100%",background:"#111",color:"#fff",border:"3px solid #111",padding:"14px",fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",cursor:loading?"wait":"crosshair" }}>{loading ? "Processing..." : "Pay Now"}</button>
                <button onClick={()=>setCart([])} style={{ width:"100%",background:"transparent",color:"rgba(0,0,0,0.35)",border:"none",padding:"8px",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",cursor:"crosshair",marginTop:4 }}>Clear Cart</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ImgUpload({value,onChange,label}){
      const ref=useRef();
      const [drag,setDrag]=useState(false);
      const read=(file)=>{ if(!file) return; const r=new FileReader(); r.onload=e=>onChange(e.target.result); r.readAsDataURL(file); };
      return(
        <div>
          <div style={{ fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",marginBottom:7 }}>{label}</div>
          <div className={`drop-zone${drag?" over":""}`} onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);read(e.dataTransfer.files[0]);}} style={{ border:"2px dashed rgba(0,0,0,0.18)",padding:"0.9rem",cursor:"crosshair", textAlign:"center",background:drag?"rgba(0,0,0,0.03)":"#fafafa", minHeight:110,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8 }}>
            {value?(
              <React.Fragment>
                <img src={value} alt="" style={{ maxHeight:90,maxWidth:"100%",objectFit:"contain" }}/>
                <button onClick={e=>{e.stopPropagation();onChange(null);}} style={{ background:"#111",color:"#fff",border:"none",fontSize:8,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",padding:"3px 9px",cursor:"crosshair" }}>Remove</button>
              </React.Fragment>
            ):(
              <React.Fragment>
                <svg width="28" height="28" viewBox="0 0 28 28" style={{ opacity:.3 }}><path d="M14 3L14 19M7 10L14 3L21 10" stroke="#111" strokeWidth="1.8" fill="none"/><path d="M3 21L3 25L25 25L25 21" stroke="#111" strokeWidth="1.8" fill="none"/></svg>
                <span style={{ fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.35)" }}>Click or drag image</span>
                <span style={{ fontSize:9,color:"rgba(0,0,0,0.22)" }}>JPEG, PNG, WEBP</span>
              </React.Fragment>
            )}
            <input ref={ref} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>read(e.target.files[0])}/>
          </div>
        </div>
      );
    }

    const ADMIN_PW_B64 = "c3Bsb3RjaDIwMjY="; // "splotch2026"
    function AdminPanel({products,setProducts,onClose}){
      const [authed,setAuthed]=useState(false);
      const [pw,setPw]=useState("");
      const [pwErr,setPwErr]=useState(false);
      const [editId,setEditId]=useState(null);

      const [form,setForm]=useState(blank);

      const showToast=(m)=>{ setToast(m); setTimeout(()=>setToast(null),2500); };
      const login=()=>{ if(btoa(pw) === ADMIN_PW_B64){ setAuthed(true); setPwErr(false); }else{ setPwErr(true); setTimeout(()=>setPwErr(false),1500); } };

      const save=()=>{
        if(!form.name||!form.price){ showToast("Name & price required."); return; }
        let upd;
        if(editId==="new"){ upd=[...products,{...form,id:"prod-"+Date.now()}]; showToast("Product added!"); }
        else{ upd=products.map(p=>p.id===editId?{...form,id:editId}:p); showToast("Saved!"); }

    function Contact(){
      const [form,setForm]=useState({name:"",email:"",message:""});
      const [sent,setSent]=useState(false);
      const [loading, setLoading]=useState(false);

      const submit = async () => {
        if(form.name && form.email && form.message) { 
          setLoading(true);
          try {
            if (window.fbAddDoc && window.fbCollection && window.fbDb) {
              await window.fbAddDoc(window.fbCollection(window.fbDb, "messages"), {
                name: form.name, email: form.email, message: form.message, timestamp: new Date()
              });
              setSent(true); setTimeout(()=>setSent(false),4000); setForm({name:"",email:"",message:""}); 
            } else { alert("Firebase is not initialized. Please configure API keys."); }
          } catch (e) {
            console.error("Error adding doc: ", e); alert("Error sending message. Check console/firebase rules.");
          }
          setLoading(false);
        } 
      };

      const iSt={ display:"block",width:"100%",background:"transparent",border:"none",borderBottom:"2px solid rgba(255,255,255,0.15)",color:"#fff",padding:"13px 0",fontSize:15,fontFamily:"Inter",transition:"border-color .2s",marginBottom:"1.8rem" };
      return(
        <section id="contact" style={{ background:"#111",borderBottom:"3px solid #111",padding:"6rem 2rem",position:"relative",overflow:"hidden" }}>
          <div className="topo-parallax-wrap" style={{ opacity:0.07 }}><TopoSVG color="#fff"/></div>

                {sent?(
                  <div style={{ border:"2px solid rgba(255,255,255,0.2)",padding:"2rem",textAlign:"center" }}><p style={{ fontWeight:700,letterSpacing:"0.12em",color:"#fff",textTransform:"uppercase",fontSize:12 }}>Message received. We'll be in touch.</p></div>
                ):(
                  <React.Fragment>
                    {["name","email"].map(field=>(
                      <input key={field} type={field==="email"?"email":"text"} placeholder={field.charAt(0).toUpperCase()+field.slice(1)} value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} style={iSt} onFocus={e=>e.target.style.borderColor="rgba(255,255,255,0.7)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.15)"}/>
                    ))}
                    <textarea placeholder="Message" value={form.message} rows={5} onChange={e=>setForm(f=>({...f,message:e.target.value}))} style={{ ...iSt,resize:"none" }} onFocus={e=>e.target.style.borderColor="rgba(255,255,255,0.7)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.15)"}/>
                    <button onClick={submit} disabled={loading} style={{ background:"#fff",color:"#111",border:"3px solid #fff",padding:"14px 36px",fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",cursor:loading?"wait":"crosshair",transition:"all .2s" }} onMouseEnter={e=>{e.target.style.background="transparent";e.target.style.color="#fff";}} onMouseLeave={e=>{e.target.style.background="#fff";e.target.style.color="#111";}}>{loading ? "Sending..." : "Send Message →"}</button>
                  </React.Fragment>
                )}
              </div>
              <div className="reveal reveal-d2">
                <p style={{ fontSize:11, lineHeight:1.6, color:"rgba(255,255,255,0.45)", marginBottom:"2rem", paddingBottom:"2rem", borderBottom:"1px solid rgba(255,255,255,0.07)" }}>Feel free to contact us with any questions or concerns. You can use the form on our website or email us directly. We appreciate your interest and look forward to hearing from you.</p>

              ].map(col=>(
                <div key={col.h}>
                  <p style={{ fontSize:9,fontWeight:700,letterSpacing:"0.28em",textTransform:"uppercase",color:"rgba(255,255,255,0.22)",marginBottom:"1rem" }}>{col.h}</p>
                  {col.ls.map(([id,label])=>(
                    <button key={label} onClick={()=>{ if(!id)return; if(id.startsWith('http')){ window.open(id,'_blank','noopener,noreferrer'); }else{ document.getElementById(id)?.scrollIntoView({behavior:"smooth"}); } }} style={{ display:"block",width:"100%",textAlign:"left",background:"none",border:"none", fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.38)", textDecoration:"none",lineHeight:2.2,textTransform:"uppercase",letterSpacing:"0.06em", cursor:"crosshair",transition:"color .15s",padding:0 }} onMouseEnter={e=>e.target.style.color="#fff"} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,0.38)"}>{label}</button>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:"1.5rem",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"0.8rem" }}>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.15)" }}>© 2026 Splotch — splotch.in</p>
              <div style={{ display:"flex",gap:"1.5rem" }}>{["Privacy","Terms","Shipping","Returns"].map(l=>( <a key={l} href="#" style={{ fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.15)",textDecoration:"none" }}>{l}</a> ))}</div>
            </div>
          </div>
        </footer>
      );
    }

    /* ═══════════════════════════════════════════════════════
       ROOT APP
    ═══════════════════════════════════════════════════════ */
    function App(){
      const [products,setProducts]=useState(loadProducts);
      const [cart,setCart]=useState([]);
      const [qv,setQV]=useState(null);
      const [adminOpen,setAdminOpen]=useState(false);
      const [cartOpen,setCartOpen]=useState(false);
      const [mobMenu,setMobMenu]=useState(false);
      const [filter,setFilter]=useState("All");
      const [showBack,setShowBack]=useState(false);
      const [logoClicks,setLogoClicks]=useState(0);
      const logoTimerRef=useRef(null);
      const [user, setUser]=useState(null);

      // Global Scroll Listener for Parallax Effects
      useEffect(() => {
        const handleScroll = () => { document.documentElement.style.setProperty('--scroll-y', `${window.scrollY}`); };
        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(()=>{
        const handleAuthChange = () => {
          if (window.fbAuth && window.fbOnAuthStateChanged) { window.fbOnAuthStateChanged(window.fbAuth, (u) => { setUser(u); }); }
        };
        if (window.fbAuth) { handleAuthChange(); } else { window.addEventListener('firebase-ready', handleAuthChange); }
        return () => window.removeEventListener('firebase-ready', handleAuthChange);
      }, []);

      useEffect(()=>{
        const obs=new IntersectionObserver( entries=>entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("visible"); }), {threshold:0.1} );
        document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
        return ()=>obs.disconnect();
      });

      useEffect(()=>{
        const fn=()=>setShowBack(window.scrollY>window.innerHeight*0.6);
        window.addEventListener("scroll",fn,{passive:true});
        return ()=>window.removeEventListener("scroll",fn);
      },[]);

      const handleLogoClick=()=>{
        const next=logoClicks+1;
        setLogoClicks(next);
        if(logoTimerRef.current) clearTimeout(logoTimerRef.current);
        if(next>=6){ setAdminOpen(true); setLogoClicks(0); return; }
        logoTimerRef.current=setTimeout(()=>setLogoClicks(0),3000);
      };

      const addToCart=useCallback((item)=>setCart(c=>[...c,item]),[]);

      const handleAuth = async () => {
        if(user && window.fbAuth) {
          try { await window.fbSignOut(window.fbAuth); } catch(err) { console.error(err); }
        } else if(window.fbAuth && window.fbProvider) {
          try { await window.fbSignInWithPopup(window.fbAuth, window.fbProvider); } catch(err) { console.error("Login failed."); }
        }
      };

      return(
        <div style={{ minHeight:"100vh",background:"#fff", position:"relative" }}>
          {/* Global Film Grain */}
          <div className="grain-overlay"></div>
          
          <ScrollProgress/>
          <Header cartCount={cart.length} onCartOpen={()=>setCartOpen(true)} onLogoClick={handleLogoClick} setMobMenu={setMobMenu} user={user} handleAuth={handleAuth} />
          <Ticker/>
          <MobMenu open={mobMenu} setOpen={setMobMenu} user={user} handleAuth={handleAuth}/>
          {showBack&&(<BackButton onBack={()=>window.scrollTo({top:0,behavior:"smooth"})} label="Top" />)}

          <Hero/>
          <Shop products={products} onQV={setQV} onAdd={addToCart} filter={filter} setFilter={setFilter}/>
          <TheWork/>
          <WhySplotch/>
          <Testimonials/>
          <About/>
          <Contact/>
          <Footer/>

          {qv&&<QuickView product={qv} onClose={()=>setQV(null)} onAdd={addToCart}/>}
          {cartOpen&&<CartSidebar cart={cart} setCart={setCart} onClose={()=>setCartOpen(false)} user={user}/>}
          {adminOpen&&<AdminPanel products={products} setProducts={setProducts} onClose={()=>setAdminOpen(false)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
