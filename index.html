    const getTotalStock = (p) => {
      if (p.sizeStock && typeof p.sizeStock === 'object') return Object.values(p.sizeStock).reduce((a,b)=>a+(parseInt(b)||0),0);
      return parseInt(p.stock)||0;
    };
    
    const getSizeStock = (p, size) => {
      if (p.sizeStock && typeof p.sizeStock === 'object') return parseInt(p.sizeStock[size])||0;
      return parseInt(p.stock)||0;
    };

    const withTimeout = (promise, ms=6000, msg="Database timeout. Make sure ad-blockers are disabled.") => {
      return Promise.race([
        promise,
        new Promise((_, rej) => setTimeout(() => rej(new Error(msg)), ms))
      ]);
    };

    const compressImage = (dataUrl, maxDim=900, quality=0.72) =>
      new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(maxDim/img.width, maxDim/img.height, 1);
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });

    // --- [CURSOR] ---
    function CustomCursor() {
      const [pulse, setPulse] = useState(false);
      const [pos, setPos] = useState({ x: -100, y: -100 });
      const [isTouch, setIsTouch] = useState(false);

      useEffect(() => {
        const handleTouchStart = () => {
          setIsTouch(true);
          document.body.classList.remove('custom-cursor-active');
        };
        const handleMouseMove = (e) => {
          if (isTouch) return;
          document.body.classList.add('custom-cursor-active');
          setPos({ x: e.clientX, y: e.clientY });
        };
        const down = () => { if(!isTouch) setPulse(true); };
        const up = () => { if(!isTouch) setPulse(false); };

        window.addEventListener('touchstart', handleTouchStart);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mousedown', down);
        window.addEventListener('mouseup', up);
        return () => { 
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('mousemove', handleMouseMove); 
          window.removeEventListener('mousedown', down); 
          window.removeEventListener('mouseup', up); 
        };
      }, [isTouch]);

      if (isTouch) return null;
      return <div className={`cursor-dot ${pulse ? 'pulse' : ''}`} style={{ left: `${pos.x}px`, top: `${pos.y}px` }}></div>;
    }

        return () => window.removeEventListener("scroll", fn);
      }, []);
      return <div style={{position:"fixed",top:0,left:0,height:3,width:w+"%",background:"#111",zIndex:999,transition:"width .1s linear"}}/>;
    }

    // --- [CART] ---
    function CartSidebar({cart, setCart, onClose, user, onAuthClick, setProducts}) {
      const ENABLE_OTP_VERIFICATION = true; 

      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState('cart'); 
      const [shipping, setShipping] = useState({name:"", phone:"", address:"", city:"", state:"", pincode:""});
      
      const [selectedIds, setSelectedIds] = useState(cart.map(i => i.cartItemId));
      const [otp, setOtp] = useState("");
      const [confirmationResult, setConfirmationResult] = useState(null);

      useEffect(() => {
        const newIds = cart.map(i => i.cartItemId);
        setSelectedIds(prev => {
          const combined = new Set([...prev, ...newIds]);
          return Array.from(combined).filter(id => newIds.includes(id));
        });
      }, [cart.length]);

      useEffect(() => {
        if (step === 'shipping' && ENABLE_OTP_VERIFICATION) {
           if(window.recaptchaVerifier) {
               window.recaptchaVerifier.clear();
               window.recaptchaVerifier = null;
           }
           window.recaptchaVerifier = new window.fbRecaptchaVerifier(window.fbAuth, 'recaptcha-container', {
             'size': 'invisible'
           });
        }
      }, [step]);

      const toggleSelect = (id) => {
        setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      };

      const selectedCartItems = cart.filter(item => selectedIds.includes(item.cartItemId));
      const total = selectedCartItems.reduce((s,i)=>s+(parseInt((i.price||"0").replace(/[^0-9]/g,""))||0),0);

      const initiateCheckout = () => { 
        if(selectedCartItems.length === 0) { alert("Please select at least one item to checkout."); return; }
        if(!user){ onAuthClick(); return; } 
        setStep('shipping'); 
      };

      const requestOTP = async () => {
        if(!shipping.name || shipping.phone.length !== 10 || !shipping.address || !shipping.city || !shipping.state || !shipping.pincode){
          alert("Please fill in all shipping details. Ensure phone number is exactly 10 digits.");
          return;
        }

        if (!ENABLE_OTP_VERIFICATION) {
          processPayment();
          return;
        }

        setLoading(true);
        try {
          const phoneNumber = "+91" + shipping.phone;
          const appVerifier = window.recaptchaVerifier;
          
          const confResult = await window.fbLinkWithPhoneNumber(user, phoneNumber, appVerifier);
          setConfirmationResult(confResult);
          setStep('otp');
          alert("OTP sent to " + phoneNumber);
        } catch (error) {
          console.warn("OTP Error (Quota reached or other issue):", error);
          if (error.code === 'auth/credential-already-in-use') {
             alert("Phone number recognized. Proceeding to secure gateway...");
             processPayment();
          } else {
             alert("Phone verification skipped. Proceeding directly to secure gateway...");
             processPayment();
          }
        }
        setLoading(false);
      };

      const verifyOTP = async () => {
        if (otp.length < 6) { alert("Enter a valid 6-digit OTP"); return; }
        setLoading(true);
        try {
          await confirmationResult.confirm(otp);
          alert("Phone verified successfully! Proceeding to payment...");
          processPayment();
        } catch (error) {
          alert("Invalid OTP. Please try again.");
          setLoading(false);
        }
      };

      const processPayment = async () => {
        setLoading(true);
        try {
          const response = await fetch('/api/createOrder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:total})});
          const data = await response.json();
          if(!response.ok) throw new Error(data.error||"Failed to create order");
          
          const options = {
            key:data.keyId,amount:total*100,currency:"INR",name:"Splotch",description:"Apparel Order",image:LOGO_SRC,order_id:data.orderId,
            handler: async function(rzpRes){
              try {
                if(!window.fbDb) throw new Error("Firebase DB not available.");
                
                await window.fbAddDoc(window.fbCollection(window.fbDb,"orders"),{
                  items: selectedCartItems, 
                  total,paymentId:rzpRes.razorpay_payment_id,orderId:rzpRes.razorpay_order_id,
                  userId:user.uid,userEmail:user.email,userName:shipping.name, 
                  shipping,timestamp:new Date(),status:"Processing"
                });
                
                // Inventory Decrement
                for(const item of selectedCartItems){
                  if(item.id){
                    try{ 
                      await window.fbUpdateDoc(window.fbDoc(window.fbDb,"products",item.id),{[`sizeStock.${item.selectedSize}`]:window.fbIncrement(-1)}); 
                      
                      // Update Local State so UI reflects missing stock instantly
                      if (setProducts) {
                         setProducts(prev => prev.map(p => {
                           if (p.id === item.id && p.sizeStock && p.sizeStock[item.selectedSize] > 0) {
                             return { ...p, sizeStock: { ...p.sizeStock, [item.selectedSize]: p.sizeStock[item.selectedSize] - 1 } };
                           }
                           return p;
                         }));

    function ImgUpload({value, onChange, label}) {
      const ref = useRef();
      const [drag, setDrag] = useState(false);
      const [compressing, setCompressing] = useState(false);
      
      const read = async (file) => {
        if(!file) return;
        setCompressing(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
          const compressed = await compressImage(e.target.result);
          onChange(compressed);
          setCompressing(false);
        };
        reader.readAsDataURL(file);
      };

      return (
        <div>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",marginBottom:7}}>{label}</div>
          <div className={`drop-zone${drag?" over":""}`} onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);read(e.dataTransfer.files[0]);}} style={{border:"2px dashed rgba(0,0,0,0.18)",padding:"0.9rem",textAlign:"center",background:drag?"rgba(0,0,0,0.03)":"#fafafa",minHeight:110,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
            {compressing?(
              <span style={{fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.4)"}}>Compressing image…</span>
            ):value?(
              <React.Fragment>
                <img src={value} alt="" style={{maxHeight:90,maxWidth:"100%",objectFit:"contain"}}/>
                <button onClick={e=>{e.stopPropagation();onChange(null);}} style={{background:"#111",color:"#fff",border:"none",fontSize:8,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",padding:"3px 9px"}}>Remove</button>
              </React.Fragment>
            ):(
              <React.Fragment>
                <svg width="28" height="28" viewBox="0 0 28 28" style={{opacity:.3}}><path d="M14 3L14 19M7 10L14 3L21 10" stroke="#111" strokeWidth="1.8" fill="none"/><path d="M3 21L3 25L25 25L25 21" stroke="#111" strokeWidth="1.8" fill="none"/></svg>
                <span style={{fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.35)"}}>Click or drag image</span>
                <span style={{fontSize:9,color:"rgba(0,0,0,0.22)"}}>Auto-compressed before saving</span>
              </React.Fragment>
            )}
            <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>read(e.target.files[0])}/>
          </div>
        </div>
      );
    }

      const [authed, setAuthed] = useState(false);
      const [email, setEmail] = useState(""); const [pw, setPw] = useState(""); const [pwErr, setPwErr] = useState("");
      const [editId, setEditId] = useState(null);
      const [tab, setTab] = useState("products");
      
      const [orders, setOrders] = useState([]);
      const [messages, setMessages] = useState([]); 
      
      const [saving, setSaving] = useState(false);

      const blankProduct = {name:"",cost:"",price:"₹1",compareAtPrice:"₹1,100",tag:"",description:"",category:"T-Shirts",frontImage:null,backImage:null,hasBack:false,sizes:"S, M, L, XL",sizeStock:{S:10,M:10,L:10,XL:10}};
      const blankPort = {label:"",cat:"",image:null,order:portfolio.length};
      const [form, setForm] = useState(blankProduct);
      const [portForm, setPortForm] = useState(blankPort);
      const [portEditId, setPortEditId] = useState(null);

      useEffect(()=>{
        if(authed && window.fbDb){
          if(tab==="orders") {
            window.fbGetDocs(window.fbQuery(window.fbCollection(window.fbDb,"orders"),window.fbOrderBy("timestamp","desc")))
              .then(snap=>{const o=[];snap.forEach(d=>o.push({id:d.id,...d.data()}));setOrders(o);})
              .catch(e=>console.error(e));
          }
          if(tab==="messages") {
            window.fbGetDocs(window.fbQuery(window.fbCollection(window.fbDb,"messages"),window.fbOrderBy("timestamp","desc")))
              .then(snap=>{const m=[];snap.forEach(d=>m.push({id:d.id,...d.data()}));setMessages(m);})
              .catch(e=>console.error(e));
          }
        }
      },[authed,tab]);

      const login = async () => {
        try {
          if(!window.fbAuth) throw new Error("Firebase Auth not connected.");
          const res = await window.fbSignInWithEmailAndPassword(window.fbAuth, email, pw);
          if(res.user.email==="splotchglobal@gmail.com"){setAuthed(true);setPwErr("");}
          else{setPwErr("Not authorized as Admin.");await window.fbSignOut(window.fbAuth);}
        }catch(err){setPwErr(err.message.replace("Firebase: ",""));}
      };

      const handleSizesChange = (v) => {
        const arr = v.split(',').map(s=>s.trim()).filter(Boolean);
        const newStock={};
        arr.forEach(s=>{newStock[s]=form.sizeStock?.[s]??10;});
        setForm({...form,sizes:v,sizeStock:newStock});
      };

      const saveProduct = async () => {
        if(!form.name||!form.price){alert("Name & price required.");return;}
        setSaving(true);
        const newId = editId==="new"?"prod-"+Date.now():editId;
        const updated = {...form, id:newId};
        try {
          if(!window.fbDb||!window.fbSetDoc) throw new Error("Firebase not connected.");
          await withTimeout(window.fbSetDoc(window.fbDoc(window.fbDb,"products",newId), updated, {merge:true}));
          setProducts(editId==="new"?[...products,updated]:products.map(p=>p.id===editId?updated:p));
          setEditId(null); setForm(blankProduct);
          alert("✓ Product saved to Firebase!");
        }catch(err){ alert("Save failed:\n" + err.message); }
        setSaving(false);
      };

      const savePortItem = async () => {
        if(!portForm.label){alert("Title required.");return;}
        setSaving(true);
        const newId = portEditId==="new"?"port-"+Date.now():portEditId;
        const updated = {...portForm, id:newId};
        try {
          if(!window.fbDb||!window.fbSetDoc) throw new Error("Firebase not connected.");
          await withTimeout(window.fbSetDoc(window.fbDoc(window.fbDb,"portfolio",newId), updated, {merge:true}));
          setPortfolio(portEditId==="new"?[...portfolio,updated]:portfolio.map(p=>p.id===portEditId?updated:p));
          setPortEditId(null); setPortForm(blankPort);
          alert("✓ Portfolio item saved!");
        }catch(err){alert("Save failed:\n" + err.message);}
        setSaving(false);
      };

      const removeProduct = async (id) => {
        if(!window.confirm("Delete product globally?")) return;
        try{ await window.fbDeleteDoc(window.fbDoc(window.fbDb,"products",id)); setProducts(products.filter(p=>p.id!==id)); if(editId===id){setEditId(null);setForm(blankProduct);} }
        catch(err){alert("Delete failed: "+err.message);}
      };

      const removePortItem = async (id) => {
        if(!window.confirm("Delete portfolio item?")) return;
        try{ await window.fbDeleteDoc(window.fbDoc(window.fbDb,"portfolio",id)); setPortfolio(portfolio.filter(p=>p.id!==id)); if(portEditId===id){setPortEditId(null);setPortForm(blankPort);} }
        catch(err){alert("Delete failed: "+err.message);}
      };

      const removeMessage = async (id) => {
        if(!window.confirm("Delete this message forever?")) return;
        try{ await window.fbDeleteDoc(window.fbDoc(window.fbDb,"messages",id)); setMessages(messages.filter(m=>m.id!==id)); }
        catch(err){alert("Delete failed: "+err.message);}
      };

      const iSt={display:"block",width:"100%",border:"2px solid rgba(0,0,0,0.14)",background:"#fff",padding:"10px 12px",fontSize:13,fontFamily:"Inter",transition:"border-color .2s"};

      if(!authed) return (
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"#111",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s"}}>
          <div style={{background:"#fff",border:"3px solid #111",padding:"2.5rem",width:"100%",maxWidth:380,position:"relative"}}>
            <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"none",border:"1.5px solid #111",width:34,height:34,fontSize:14,fontWeight:700}}>✕</button>
            <img src={LOGO_SRC} alt="Splotch" style={{height:44,marginBottom:"1.5rem"}}/>
            <h2 style={{fontFamily:"Playfair Display",fontWeight:700,fontSize:26,marginBottom:"0.4rem"}}>Admin Portal</h2>
            <p style={{fontSize:12,color:"rgba(0,0,0,0.4)",marginBottom:"1.8rem"}}>Authenticate to access the global backend.</p>
            <input className="admin-input" type="email" placeholder="Admin Email" value={email} onChange={e=>setEmail(e.target.value)} style={{...iSt,marginBottom:"0.5rem"}}/>
            <input className="admin-input" type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} style={{...iSt,marginBottom:"0.9rem"}}/>
            <button onClick={login} style={{width:"100%",background:"#111",color:"#fff",border:"3px solid #111",padding:"13px",fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase"}}>Secure Unlock</button>
            {pwErr&&<p style={{color:"#c00",fontSize:10,fontWeight:700,marginTop:10,textAlign:"center"}}>{pwErr}</p>}
          </div>
        </div>
      );

      const sizeArr = form.sizes?form.sizes.split(',').map(s=>s.trim()).filter(Boolean):[];

      return (
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"#fff",overflow:"auto",animation:"fadeIn .2s"}}>

            <div style={{display:"flex",gap:"0.6rem"}}>

              <button onClick={()=>{setTab("portfolio"); setPortEditId(null);}} style={{background:tab==="portfolio"?"#fff":"transparent",color:tab==="portfolio"?"#111":"#fff",border:"2px solid #fff",padding:"7px 16px",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>PORTFOLIO</button>
              <button onClick={()=>setTab("orders")} style={{background:tab==="orders"?"#fff":"transparent",color:tab==="orders"?"#111":"#fff",border:"2px solid #fff",padding:"7px 16px",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>ORDERS</button>
              <button onClick={()=>setTab("messages")} style={{background:tab==="messages"?"#fff":"transparent",color:tab==="messages"?"#111":"#fff",border:"2px solid #fff",padding:"7px 16px",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>MESSAGES</button>

            </div>
          </div>

          </div>

          <div style={{padding:"2rem"}}>

            {tab==="products"&&(

                <div>
                  <button onClick={()=>{setForm(blankProduct);setEditId("new");}} style={{width:"100%",padding:"15px",background:"#111",color:"#fff",fontWeight:900,marginBottom:"1rem"}}>+ CREATE NEW PRODUCT</button>

                    return (

                          <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"2px 5px",background:ts<=0?"#c00":"transparent",color:ts<=0?"#fff":editId===p.id?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.4)",border:`1px solid ${ts<=0?"#c00":editId===p.id?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.12)"}`}}>{ts<=0?"Sold Out":`Stock: ${ts}`}</span>
                          <button onClick={e=>{e.stopPropagation();removeProduct(p.id);}} style={{fontSize:7,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"2px 5px",background:"transparent",color:"rgba(180,0,0,0.55)",border:"1px solid rgba(180,0,0,0.18)"}}>Delete</button>
                        </div>
                      </div>
                    );

                {editId&&(

                      <button onClick={()=>{setEditId(null);setForm(blankProduct);}} style={{background:"none",border:"1.5px solid #111",width:34,height:34,fontSize:13,fontWeight:700}}>✕</button>
                    </div>
                    <div className="admin-form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"1.3rem"}}>
                      <div style={{gridColumn:"1/-1"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Product Name *</label><input className="admin-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Terrain Tee 001" style={iSt}/></div>
                      <div style={{gridColumn:"1/2"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Old Price</label><input className="admin-input" value={form.compareAtPrice||""} onChange={e=>setForm({...form,compareAtPrice:e.target.value})} placeholder="₹1,100" style={iSt}/></div>
                      <div style={{gridColumn:"2/3"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Active Price *</label><input className="admin-input" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder="₹1" style={iSt}/></div>
                      <div style={{gridColumn:"3/4"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Tag</label><input className="admin-input" value={form.tag} onChange={e=>setForm({...form,tag:e.target.value})} placeholder="New Drop" style={iSt}/></div>
                      <div style={{gridColumn:"1/-1"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Category</label><input className="admin-input" value={form.category} onChange={e=>setForm({...form,category:e.target.value})} placeholder="T-Shirts" style={iSt}/></div>
                      <div style={{gridColumn:"1/-1"}}>
                        <label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Sizes (comma-separated)</label>
                        <input className="admin-input" value={form.sizes} onChange={e=>handleSizesChange(e.target.value)} placeholder="S, M, L, XL" style={iSt}/>
                      </div>
                      {sizeArr.length>0&&(
                        <div style={{gridColumn:"1/-1"}}>
                          <label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:10}}>Stock Per Size *</label>
                          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(sizeArr.length,4)},1fr)`,gap:"0.8rem"}}>
                            {sizeArr.map(s=>(
                              <div key={s}>
                                <label style={{fontSize:9,fontWeight:900,letterSpacing:"0.15em",textTransform:"uppercase",color:"#111",display:"block",marginBottom:4,textAlign:"center"}}>{s}</label>
                                <input type="number" min="0" className="admin-input" value={form.sizeStock?.[s]??0} onChange={e=>setForm({...form,sizeStock:{...form.sizeStock,[s]:parseInt(e.target.value)||0}})} style={{...iSt,textAlign:"center",fontWeight:700}}/>
                              </div>
                            ))}
                          </div>
                          <div style={{marginTop:8,padding:"8px 12px",background:"#f0f0f0",fontSize:10,fontWeight:700,color:"rgba(0,0,0,0.5)"}}>
                            Total: {sizeArr.reduce((t,s)=>t+(parseInt(form.sizeStock?.[s])||0),0)} units
                          </div>
                        </div>
                      )}
                      <div style={{gridColumn:"1/-1"}}><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Description</label><textarea className="admin-input" rows={3} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Short description..." style={{...iSt,resize:"none"}}/></div>
                      <div style={{gridColumn:"1/-1",display:"flex",gap:"0.8rem",alignItems:"center"}}>
                        <button type="button" onClick={()=>setForm({...form,hasBack:!form.hasBack,backImage:form.hasBack?null:form.backImage})} style={{background:form.hasBack?"#111":"#fff",color:form.hasBack?"#fff":"#111",border:"2px solid #111",padding:"9px 18px",fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase"}}>{form.hasBack?"✓ Front + Back":"Front Only"}</button>
                        <span style={{fontSize:11,color:"rgba(0,0,0,0.35)"}}>Toggle back photo</span>
                      </div>
                      <div style={{gridColumn:form.hasBack?"1/2":"1/-1"}}><ImgUpload value={form.frontImage} onChange={v=>setForm({...form,frontImage:v})} label="Front Image *"/></div>
                      {form.hasBack&&<div style={{gridColumn:"2/4"}}><ImgUpload value={form.backImage} onChange={v=>setForm({...form,backImage:v})} label="Back Image"/></div>}
                    </div>
                    <button type="button" onClick={saveProduct} disabled={saving} style={{width:"100%",background:saving?"#666":"#111",color:"#fff",border:`3px solid ${saving?"#666":"#111"}`,padding:"14px 36px",fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",marginTop:"1.8rem"}}>
                      {saving?"Saving…":(editId==="new"?"Add Product":"Save Changes")}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* Portfolio Tab */}
            {tab==="portfolio"&&(
              <div style={{display:"grid",gridTemplateColumns:portEditId?"1fr 1.4fr":"1fr",gap:"2rem"}} className="admin-form-grid">
                <div>
                  <button onClick={()=>{setPortForm({...blankPort,order:portfolio.length});setPortEditId("new");}} style={{width:"100%",padding:"15px",background:"#111",color:"#fff",fontWeight:900,marginBottom:"1rem"}}>+ ADD PORTFOLIO ITEM</button>
                  {portfolio.map(p=>(
                    <div key={p.id} onClick={()=>{setPortForm(p);setPortEditId(p.id);}} style={{display:"flex",alignItems:"center",gap:"0.9rem",border:"2px solid #111",padding:"0.9rem 1rem",background:portEditId===p.id?"#111":"#fff",color:portEditId===p.id?"#fff":"#111",marginBottom:"4px",cursor:"pointer"}}>
                      <div style={{width:52,height:52,background:"#333",flexShrink:0,overflow:"hidden"}}>{p.image?<img src={p.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"rgba(255,255,255,0.15)"}}>◎</div>}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:"-0.01em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.label||"Untitled"}</div>
                        <div style={{fontSize:11,color:portEditId===p.id?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.4)",marginTop:1}}>{p.cat}</div>
                      </div>
                      <button onClick={e=>{e.stopPropagation();removePortItem(p.id);}} style={{fontSize:7,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"2px 5px",background:"transparent",color:"rgba(180,0,0,0.55)",border:"1px solid rgba(180,0,0,0.18)",flexShrink:0}}>Delete</button>
                    </div>
                  ))}
                </div>
                {portEditId&&(
                  <div style={{padding:"2rem",background:"#fafafa",border:"2px solid #111"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.8rem"}}>
                      <h3 style={{fontFamily:"Playfair Display",fontWeight:700,fontSize:22}}>{portEditId==="new"?"New Portfolio Item":"Edit Portfolio Item"}</h3>
                      <button onClick={()=>{setPortEditId(null);setPortForm(blankPort);}} style={{background:"none",border:"1.5px solid #111",width:34,height:34,fontSize:13,fontWeight:700}}>✕</button>
                    </div>
                    <div style={{display:"grid",gap:"1.3rem"}}>
                      <div><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Title *</label><input className="admin-input" value={portForm.label} onChange={e=>setPortForm({...portForm,label:e.target.value})} placeholder="Terrain Vol.001" style={iSt}/></div>
                      <div><label style={{fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(0,0,0,0.4)",display:"block",marginBottom:6}}>Category / Tag</label><input className="admin-input" value={portForm.cat} onChange={e=>setPortForm({...portForm,cat:e.target.value})} placeholder="Capsule Drop" style={iSt}/></div>

                      <ImgUpload value={portForm.image} onChange={v=>setPortForm({...portForm,image:v})} label="Portfolio Image (compressed on upload)"/>

                    <button type="button" onClick={savePortItem} disabled={saving} style={{width:"100%",background:saving?"#666":"#111",color:"#fff",border:`3px solid ${saving?"#666":"#111"}`,padding:"14px",fontSize:11,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",marginTop:"1.8rem"}}>
                      {saving?"Saving…":(portEditId==="new"?"Add to Portfolio":"Save Portfolio Item")}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* Orders Tab WITH STATUS CONTROLLER */}
            {tab==="orders"&&(
              <div>

                  <div key={o.id} style={{border:"2px solid #111",padding:"1.5rem",marginBottom:"1rem",background:"#fafafa"}}>

                      <span style={{color:"#c00",fontWeight:900}}>₹{o.total}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",fontSize:"12px"}}>

    function Hero() {
      const rafRef = useRef(null);
      const targetRef = useRef({x:0,y:0});
      const currentRef = useRef({x:0,y:0});
      const [smooth, setSmooth] = useState({x:0,y:0});

      useEffect(()=>{
        const lerp=(a,b,t)=>a+(b-a)*t;
        const tick=()=>{
          currentRef.current.x=lerp(currentRef.current.x,targetRef.current.x,0.07);
          currentRef.current.y=lerp(currentRef.current.y,targetRef.current.y,0.07);
          setSmooth({x:currentRef.current.x,y:currentRef.current.y});
          rafRef.current=requestAnimationFrame(tick);
        };
        rafRef.current=requestAnimationFrame(tick);
        return()=>cancelAnimationFrame(rafRef.current);
      },[]);

      const handleMove=useCallback(e=>{
        targetRef.current={x:(e.clientX/window.innerWidth-0.5)*2,y:(e.clientY/window.innerHeight-0.5)*2};
      },[]);
      const handleTouch=useCallback(e=>{
        const t=e.touches[0];
        targetRef.current={x:(t.clientX/window.innerWidth-0.5)*2,y:(t.clientY/window.innerHeight-0.5)*2};
      },[]);

      const build3DShadow=(mx,my)=>{
        const hx=(mx*6).toFixed(1), hy=(my*6).toFixed(1);
        const hx2=(mx*11).toFixed(1), hy2=(my*11).toFixed(1);
        const layers=[
          {d:1,  r:228,g:30, b:30, a:0.98},
          {d:2.5,r:200,g:5,  b:5,  a:0.92},
          {d:4,  r:170,g:0,  b:0,  a:0.84},
          {d:6,  r:135,g:0,  b:0,  a:0.72},
          {d:8,  r:90, g:0,  b:0,  a:0.55},
          {d:10, r:50, g:0,  b:0,  a:0.36},
          {d:12, r:18, g:0,  b:0,  a:0.2 },
        ];
        return [
          `${hx}px ${hy}px 0px rgba(255,255,255,0.72)`,
          `${hx2}px ${hy2}px 0px rgba(255,255,255,0.3)`,
          ...layers.map(l=>`${(-mx*l.d*1.5).toFixed(1)}px ${(-my*l.d*1.5).toFixed(1)}px 0px rgba(${l.r},${l.g},${l.b},${l.a})`),
          `${(-mx*20).toFixed(1)}px ${(-my*20).toFixed(1)}px 30px rgba(0,0,0,0.62)`,
        ].join(', ');
      };

      const bgX=smooth.x*18, bgY=smooth.y*18;

      return (
        <section id="home" onMouseMove={handleMove} onTouchMove={handleTouch}
          style={{position:"relative",width:"100%",height:"80vh",background:"#111",borderBottom:"3px solid #111",overflow:"hidden",display:"grid",placeItems:"center"}}>

          <div style={{position:"absolute",inset:"-60px",background:"#111",
            backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.032) 39px,rgba(255,255,255,0.032) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.032) 39px,rgba(255,255,255,0.032) 40px)",
            transform:`translate(${bgX*0.28}px,${bgY*0.28}px)`,zIndex:1,willChange:"transform"}}/>

          <div style={{position:"absolute",inset:"-40px",opacity:0.065,pointerEvents:"none",
            transform:`translate(${bgX*0.52}px,${bgY*0.52}px)`,zIndex:2,willChange:"transform"}}>
            <TopoSVG color="#fff" style={{width:"120%",height:"120%"}}/>
          </div>

          <div className="hero-sub" style={{zIndex:4}}>
            <p>Techwear</p><p>SS'26 Collection</p><p>splotch.in</p>
            <span className="hero-badge">New Drop Available</span>
          </div>

          <div className="hero-text-overlay" style={{zIndex:5}}>
            <h1 className="hero-h1 reveal visible" style={{textShadow:build3DShadow(smooth.x,smooth.y)}}>SPLOTCH</h1>
          </div>
        </section>
      );
    }

    function Contact() {
      const [form,setForm]=useState({name:"",email:"",message:""});
      const [sent,setSent]=useState(false);
      const [loading,setLoading]=useState(false);
      const [errMsg,setErrMsg]=useState("");

      const submit=async(e)=>{
        e.preventDefault();
        if(!form.name||!form.email||!form.message) return;
        setLoading(true); setErrMsg("");
        try {
          if(!window.fbAddDoc||!window.fbDb) throw new Error("Firebase is not connected.");
          
          await withTimeout(
            window.fbAddDoc(window.fbCollection(window.fbDb,"messages"),{
              name:form.name,email:form.email,message:form.message,timestamp:new Date()
            })
          );

          if (window.emailjs) {
            try {
              await window.emailjs.send(
                "service_wm633dr", 
                "template_igjj8ga",
                { name: form.name, email: form.email, message: form.message }
              );
            } catch(emailErr) {
              console.warn("EmailJS failed, but message saved to DB:", emailErr);
            }
          }

          setSent(true); setTimeout(()=>setSent(false),5000); setForm({name:"",email:"",message:""});
        }catch(err){
          console.error("Contact form error:",err);
          setErrMsg(err.code==="permission-denied"
            ? "Firebase permission denied. Go to Firebase Console → Firestore → Rules and set: allow read, write: if true;"
            : "Failed to send: "+err.message);
        }
        finally{setLoading(false);}
      };

      const iSt={display:"block",width:"100%",background:"transparent",border:"none",borderBottom:"2px solid #333",color:"#fff",padding:"15px",fontFamily:"Inter",marginBottom:"1rem"};

                {sent?(

        );
      }, []);

      useEffect(()=>{localStorage.setItem('splotch_cart_v1',JSON.stringify(cart));},[cart]);

      // Load products & portfolio (FIXED TO ATTACH ID)
      useEffect(()=>{
        const initData=async()=>{
          if(!window.fbDb||!window.fbGetDocs) return;
          try{
            const snap=await window.fbGetDocs(window.fbCollection(window.fbDb,"products"));
            if(snap.empty){
              DEFAULT_PRODUCTS.forEach(p=>window.fbSetDoc(window.fbDoc(window.fbDb,"products",p.id),p).catch(e=>console.warn(e)));
              setProducts(DEFAULT_PRODUCTS);
            }else{
              const fetched=[];snap.forEach(d=>fetched.push({ id: d.id, ...d.data() }));setProducts(fetched);
            }
            
            const portSnap=await window.fbGetDocs(window.fbCollection(window.fbDb,"portfolio"));
            if(portSnap.empty){
              DEFAULT_PORTFOLIO.forEach(p=>window.fbSetDoc(window.fbDoc(window.fbDb,"portfolio",p.id),p).catch(e=>console.warn(e)));
              setPortfolio(DEFAULT_PORTFOLIO);
            }else{
              const fetchedPort=[];portSnap.forEach(d=>fetchedPort.push({ id: d.id, ...d.data() }));setPortfolio(fetchedPort);
            }
          }catch(e){console.error("Data load error:",e);setProducts(DEFAULT_PRODUCTS);setPortfolio(DEFAULT_PORTFOLIO);}
        };
        if(window.fbDb)initData();
        else window.addEventListener('firebase-ready',initData);
        return()=>window.removeEventListener('firebase-ready',initData);
      },[]);

      useEffect(()=>{
        const initAuth=()=>{if(window.fbAuth)window.fbOnAuthStateChanged(window.fbAuth,u=>setUser(u));};
        if(window.fbAuth)initAuth();
        else window.addEventListener('firebase-ready',initAuth);
        return()=>window.removeEventListener('firebase-ready',initAuth);
      },[]);

      useEffect(()=>{
        const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible");}),{threshold:0.1});
        document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
        return()=>obs.disconnect();
      });

      const handleLogoClick=()=>{
        if (window.innerWidth <= 768) return; 

        const next=logoClicks+1;setLogoClicks(next);
        if(logoTimerRef.current)clearTimeout(logoTimerRef.current);
        if(next>=6){setAdminOpen(true);setLogoClicks(0);return;}
        logoTimerRef.current=setTimeout(()=>setLogoClicks(0),3000);
      };

      const addToCart=useCallback(item=>setCart(c=>[...c,{...item,cartItemId:Date.now()+Math.random()}]),[]);

      return (
        <div style={{minHeight:"100vh",background:"#fff",position:"relative"}}>
          <CustomCursor/>
          <div className="grain-overlay"/>
          <ScrollProgress/>
          
          <Header 
            cartCount={cart.length} 
            onCartOpen={()=>setCartOpen(true)} 
            onLogoClick={handleLogoClick} 
            setMobMenu={setMobMenu} 
            user={user} 
            onAuthClick={()=>setAuthOpen(true)} 
            handleLogout={()=>window.fbSignOut(window.fbAuth)}
            openUserOrders={()=>setOrdersOpen(true)}
          />
          <Ticker/>
          
          <MobMenu 
            open={mobMenu} 
            setOpen={setMobMenu} 
            user={user} 
            onAuthClick={()=>setAuthOpen(true)} 
            handleLogout={()=>window.fbSignOut(window.fbAuth)}
            openUserOrders={()=>setOrdersOpen(true)}
          />

          <Hero/>
          <Shop products={products} onQV={setQV} onAdd={addToCart} filter={filter} setFilter={setFilter}/>
          <TheWork portfolio={portfolio}/>
          <WhySplotch/>
          <Testimonials/>
          <Contact/>
          <Footer/>
          
          {qv&&<QuickView product={qv} onClose={()=>setQV(null)} onAdd={addToCart}/>}
          {cartOpen&&<CartSidebar cart={cart} setCart={setCart} onClose={()=>setCartOpen(false)} user={user} onAuthClick={()=>setAuthOpen(true)} setProducts={setProducts} />}
          {adminOpen&&<AdminPanel products={products} setProducts={setProducts} portfolio={portfolio} setPortfolio={setPortfolio} onClose={()=>setAdminOpen(false)}/>}
          {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)} onSuccess={()=>setAuthOpen(false)}/>}
          {ordersOpen && user && <UserOrdersModal user={user} onClose={() => setOrdersOpen(false)} />}
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
