    /* ══════════════════════════════════════
       SHOP LOADER
    ══════════════════════════════════════ */
    #shop-loader {
      position: fixed;
      inset: 0;
      z-index: 100000;
      pointer-events: all;
      overflow: hidden;
    }

    /* Two shutter panels */
    .shutter-top,
    .shutter-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 50%;
      background: #0a0a0a;
      transition: transform 0.75s cubic-bezier(0.76, 0, 0.24, 1);
      will-change: transform;
    }

    .shutter-top {
      top: 0;
      transform-origin: top;
    }

    .shutter-bottom {
      bottom: 0;
      transform-origin: bottom;
    }

    #shop-loader.opening .shutter-top {
      transform: translateY(-100%);
    }

    #shop-loader.opening .shutter-bottom {
      transform: translateY(100%);
    }

    /* Scanline sweep on top panel */
    .shutter-top::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(220, 28, 28, 0.6) 30%, rgba(220, 28, 28, 1) 50%, rgba(220, 28, 28, 0.6) 70%, transparent 100%);
      bottom: 0;
      animation: scanMove 1.8s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes scanMove {
      0% {
        transform: translateY(0) scaleX(0.6);
        opacity: 0;
      }

      20% {
        opacity: 1;
        transform: scaleX(1);
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translateY(-120px) scaleX(0.6);
        opacity: 0;
      }
    }

    /* Center content (sits above both panels via stacking) */
    .loader-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      gap: 0;
    }

    .loader-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: invert(1);
      opacity: 0;
      transform: scale(0.85);
      animation: loaderLogoIn 0.5s 0.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes loaderLogoIn {
      to {
        opacity: 0.9;
        transform: scale(1);
      }
    }

    .loader-brand {

      return parseInt(p.stock) || 0;
    };

    const getSizeStock = (p, size) => {

    const withTimeout = (promise, ms = 6000, msg = "Database timeout. Make sure ad-blockers are disabled.") =>

    const compressImage = (dataUrl, maxDim = 900, quality = 0.72) =>
      new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });

    function ReturnModal({ onClose }) {

        e.preventDefault();
        if (!form.orderId || !form.email || !form.reason) return;
        setLoading(true); setErrMsg("");
        try {
          if (!window.fbDb || !window.fbAddDoc) throw new Error("Firebase not connected.");
          await window.fbAddDoc(window.fbCollection(window.fbDb, "messages"), {
            name: "RETURN REQUEST", email: form.email,
            message: `Order ID: ${form.orderId}\nReason: ${form.reason}`,
            timestamp: new Date()

      const safeName = user ? (user.displayName || user.email || 'USER').split('@')[0].toUpperCase() : '';

      return (
        <header className={scrolled ? 'scrolled' : ''}>
          <button className="logo-btn" onClick={(e) => { e.preventDefault(); onLogoClick && onLogoClick(); }} title="Splotch">
            <img src={LOGO_SRC} alt="Splotch" style={{ height: 32, width: 'auto', display: 'block', transform: 'scale(2.2)', transformOrigin: 'left center', filter: 'invert(1)' }} />
          </button>
          <nav className="desk-nav" style={{ display: 'flex', gap: '2.5rem', alignItems: 'center' }}>
            <a href="/" className="nl">HOME</a>
            <a href="/shop.html" className="nl">SHOP</a>
            <a href="/about.html" className="nl">ABOUT</a>
          </nav>
          <div style={{ display: 'flex', alignItems: 'center', gap: '1.2rem' }}>
            <div className="auth-container desk-nav">
              {user ? (
                <div className="user-menu-container">
                  <div className="user-badge">{safeName}<span style={{ fontSize: '7px', opacity: 0.6, marginLeft: 4 }}>▼</span></div>
                  <div className="user-dropdown">
                    <button className="user-dropdown-btn" onClick={openUserOrders}>My Orders</button>
                    <button className="user-dropdown-btn" onClick={handleLogout}>Logout</button>
                  </div>
                </div>
              ) : (
                <button className="nav-signin" onClick={onAuthClick}>SIGN IN</button>
              )}
            </div>
            <button className="mob-ham" onClick={() => setMobMenu(o => !o)}>
              <span /><span /><span />
            </button>
            {onCartOpen && (
              <button onClick={onCartOpen} className="enter-btn" style={{ display: "flex", alignItems: "center", gap: 6, background: "#fff", color: "#111" }}>
                CART
                {cartCount > 0 && <span style={{ background: "#111", color: "#fff", width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 900, borderRadius: '50%' }}>{cartCount}</span>}
              </button>
            )}
          </div>
        </header>
      );
    }

    function MobMenu({ open, setOpen, user, onAuthClick, handleLogout, openUserOrders }) {
      const safeName = user ? (user.displayName || user.email || 'USER').split('@')[0].toUpperCase() : '';
      const btnSt = { background: "none", border: "none", textAlign: "left", fontFamily: "Playfair Display", fontWeight: 900, fontSize: "clamp(38px,10vw,60px)", letterSpacing: "-0.04em", textTransform: "uppercase", color: "#fff", lineHeight: 1.1, borderBottom: "1px solid rgba(255,255,255,0.07)", padding: "0.5rem 0", textDecoration: "none", display: "block", width: "100%" };
      return (
        <div className="mob-menu" style={{ position: "fixed", inset: 0, zIndex: 600, background: "#0a0a0a", display: "flex", flexDirection: "column", justifyContent: "center", padding: "3rem 2rem", transform: open ? "translateX(0)" : "translateX(100%)", transition: "transform .4s cubic-bezier(.76,0,.24,1)" }}>
          <button onClick={() => setOpen(false)} style={{ position: "absolute", top: 16, right: 16, background: "none", border: "1.5px solid rgba(255,255,255,0.2)", width: 42, height: 42, color: "#fff", fontSize: 18, fontWeight: 700 }}>✕</button>
          <img src={LOGO_SRC} alt="Splotch" style={{ height: 48, width: "auto", marginBottom: "2.5rem", opacity: 0.8, filter: "invert(1)" }} />
          <a href="/" style={btnSt}>HOME</a>
          <a href="/shop.html" style={btnSt}>SHOP</a>
          <a href="/about.html" style={btnSt}>ABOUT</a>
          <div style={{ marginTop: '2rem', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '2rem' }}>
            {user ? (
              <React.Fragment>
                <span style={{ color: '#fff', fontSize: 12, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', display: 'block', marginBottom: '1rem' }}>WELCOME, {safeName}</span>
                <button onClick={() => { openUserOrders(); setOpen(false); }} style={{ background: 'transparent', color: '#fff', border: '1px solid #fff', padding: '10px 20px', fontSize: 10, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', marginRight: 10 }}>My Orders</button>
                <button onClick={() => { handleLogout(); setOpen(false); }} style={{ background: 'transparent', color: '#fff', border: '1px solid #fff', padding: '10px 20px', fontSize: 10, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Logout</button>
              </React.Fragment>
            ) : (
              <button onClick={() => { if (onAuthClick) onAuthClick(); setOpen(false); }} style={{ background: '#fff', color: '#111', border: 'none', padding: '12px 24px', fontSize: 11, fontWeight: 900, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Sign In</button>
            )}
          </div>
        </div>
      );
    }

    function UserOrdersModal({ user, onClose }) {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        const fetchOrders = async () => {
          if (!window.fbDb || !window.fbWhere) return;
          try {
            const q = window.fbQuery(window.fbCollection(window.fbDb, "orders"), window.fbWhere("userId", "==", user.uid));
            const snap = await window.fbGetDocs(q);
            const fetched = [];
            snap.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
            fetched.sort((a, b) => b.timestamp?.seconds - a.timestamp?.seconds);
            setOrders(fetched);
          } catch (err) { console.error("Failed to load user orders:", err); }
          finally { setLoading(false); }
        };
        fetchOrders();
      }, [user]);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 900, background: "rgba(17,17,17,0.8)", display: "flex", alignItems: "center", justifyContent: "center", padding: "2rem", animation: "fadeIn .2s ease" }}>
          <div style={{ background: "#fff", border: "3px solid #111", width: "100%", maxWidth: 600, maxHeight: "80vh", display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "1.2rem 1.8rem", borderBottom: "2px solid #111", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 22 }}>My Orders</span>
              <button onClick={onClose} style={{ background: "none", border: "1.5px solid #111", width: 34, height: 34, fontSize: 14, fontWeight: 700 }}>✕</button>
            </div>
            <div style={{ flex: 1, overflow: "auto", padding: "1.5rem" }}>
              {loading ? (
                <p style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", textAlign: "center", padding: "2rem" }}>Loading orders...</p>
              ) : orders.length === 0 ? (
                <p style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", textAlign: "center", padding: "2rem" }}>No past orders found.</p>
              ) : orders.map(o => {
                const date = o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString() : "Recent";
                const status = o.status || "Processing";
                const statusColor = status === "Delivered" ? "#008000" : status === "Shipped" ? "#0055ff" : "#d4a017";
                return (
                  <div key={o.id} style={{ border: "2px solid #111", padding: "1.2rem", marginBottom: "1rem", background: "#fafafa" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid #ddd", paddingBottom: "10px", marginBottom: "10px" }}>
                      <strong style={{ fontSize: 12 }}>ORDER ID: <span style={{ color: "rgba(0,0,0,0.5)", fontWeight: 400 }}>{o.orderId || o.id}</span></strong>
                      <span style={{ color: "#c00", fontWeight: 900, fontSize: 14 }}>₹{o.total}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                      <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", margin: 0 }}>Placed on {date}</p>
                      <span style={{ fontSize: 9, fontWeight: 900, letterSpacing: "0.15em", textTransform: "uppercase", padding: "4px 8px", border: `1.5px solid ${statusColor}`, color: statusColor, background: "#fff" }}>{status}</span>
                    </div>
                    <div style={{ background: "#111", color: "#fff", padding: "1rem", fontSize: "11px", lineHeight: 1.6 }}>
                      <strong style={{ color: "rgba(255,255,255,0.5)", letterSpacing: "0.1em" }}>ITEMS PURCHASED:</strong><br />
                      {o.items?.map((i, idx) => (
                        <div key={idx} style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.1)", padding: "4px 0" }}>
                          <span>{i.name}</span><span>{i.selectedSize}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function CartSidebar({ cart, setCart, onClose, user, onAuthClick, setProducts, notify }) {
      const ENABLE_OTP_VERIFICATION = true;
      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState('cart');
      const [shipping, setShipping] = useState({ name: "", phone: "", address: "", city: "", state: "", pincode: "" });
      const [selectedIds, setSelectedIds] = useState(cart.map(i => i.cartItemId));
      const [otp, setOtp] = useState("");
      const [confirmationResult, setConfirmationResult] = useState(null);
      const [promoInput, setPromoInput] = useState("");
      const [appliedPromo, setAppliedPromo] = useState(null);
      const [promoErr, setPromoErr] = useState("");
      const [applyingPromo, setApplyingPromo] = useState(false);

      useEffect(() => {
        const newIds = cart.map(i => i.cartItemId);
        setSelectedIds(prev => {
          const combined = new Set([...prev, ...newIds]);
          return Array.from(combined).filter(id => newIds.includes(id));
        });
      }, [cart.length]);

      useEffect(() => {
        if (step === 'shipping' && ENABLE_OTP_VERIFICATION) {
          if (window.recaptchaVerifier) { window.recaptchaVerifier.clear(); window.recaptchaVerifier = null; }
          window.recaptchaVerifier = new window.fbRecaptchaVerifier(window.fbAuth, 'recaptcha-container', { 'size': 'invisible' });
        }
      }, [step]);

      const toggleSelect = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      const selectedCartItems = cart.filter(item => selectedIds.includes(item.cartItemId));
      const subtotal = selectedCartItems.reduce((s, i) => s + (parseInt((i.price || "0").replace(/[^0-9]/g, "")) || 0), 0);
      const discount = appliedPromo ? (parseInt(appliedPromo.discountAmount) || 0) : 0;
      const total = Math.max(0, subtotal - discount);

      const handleApplyPromo = async () => {
        if (!promoInput.trim()) return;
        setApplyingPromo(true); setPromoErr("");
        try {
          const q = window.fbQuery(window.fbCollection(window.fbDb, "promos"), window.fbWhere("code", "==", promoInput.trim().toUpperCase()));
          const snap = await window.fbGetDocs(q);
          if (snap.empty) { setPromoErr("Invalid promo code."); setAppliedPromo(null); }
          else {
            const promo = snap.docs[0].data();
            if (promo.isActive) { setAppliedPromo(promo); setPromoInput(""); }
            else { setPromoErr("This promo code is inactive."); setAppliedPromo(null); }
          }
        } catch (e) { setPromoErr("Error validating code."); setAppliedPromo(null); }
        setApplyingPromo(false);
      };

      const removePromo = () => { setAppliedPromo(null); setPromoErr(""); };

      const initiateCheckout = () => {
        if (selectedCartItems.length === 0) { notify("Please select at least one item to checkout.", "error"); return; }
        if (!user) { onAuthClick(); return; }
        setStep('shipping');
      };

      const requestOTP = async () => {
        const sanitizeInput = (str) => typeof str === 'string' ? str.replace(/[<>'"]/g, '').trim() : '';
        let sName = sanitizeInput(shipping.name);
        let sPhone = sanitizeInput(shipping.phone).replace(/\D/g, '');
        let sAddress = sanitizeInput(shipping.address);
        let sCity = sanitizeInput(shipping.city);
        let sState = sanitizeInput(shipping.state);
        let sPincode = sanitizeInput(shipping.pincode);

        if (sName.length < 2 || sName.length > 200) { notify("Invalid name length.", "error"); return; }
        if (sPhone.length !== 10) { notify("Ensure phone number is exactly 10 digits.", "error"); return; }
        if (!sAddress || !sCity || !sState || !sPincode) { notify("Please fill in all shipping details.", "error"); return; }
        if (selectedCartItems.length < 1 || selectedCartItems.length > 10) { notify("Maximum 10 items allowed per checkout.", "error"); return; }

        const lastSubmit = sessionStorage.getItem("lastSubmit_order");
        if (lastSubmit && (Date.now() - parseInt(lastSubmit) < 30000)) {
          notify("Please wait before trying again.", "info"); return;
        }
        
        setShipping({ name: sName, phone: sPhone, address: sAddress, city: sCity, state: sState, pincode: sPincode });
        sessionStorage.setItem("lastSubmit_order", Date.now().toString());

        if (!ENABLE_OTP_VERIFICATION) { processPayment(); return; }
        setLoading(true);
        try {
          const confResult = await window.fbLinkWithPhoneNumber(user, "+91" + sPhone, window.recaptchaVerifier);
          setConfirmationResult(confResult);
          setStep('otp');
          notify("OTP sent to +91" + sPhone, "success");
        } catch (error) {
          if (error.code === 'auth/credential-already-in-use') { notify("Phone number recognized. Proceeding to secure gateway...", "info"); processPayment(); }
          else { notify("Phone verification skipped. Proceeding directly to secure gateway...", "info"); processPayment(); }
        }
        setLoading(false);
      };

      const verifyOTP = async () => {
        if (otp.length < 6) { notify("Enter a valid 6-digit OTP", "error"); return; }
        setLoading(true);
        try {
          await confirmationResult.confirm(otp);
          notify("Phone verified! Proceeding to payment...", "success");
          processPayment();
        } catch (error) { notify("Invalid OTP. Please try again.", "error"); setLoading(false); }
      };

      const processPayment = async () => {
        setLoading(true);
        try {
          const response = await fetch('/api/createOrder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: total }) });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Failed to create order");
          const options = {
            key: data.keyId, amount: total * 100, currency: "INR",
            name: "Splotch", description: "Apparel Order", image: LOGO_SRC, order_id: data.orderId,
            handler: async function (rzpRes) {
              try {
                if (!window.fbDb) throw new Error("Firebase DB not available.");
                const hasPreorderItems = selectedCartItems.some(i => i.isPreorderItem);
                await window.fbAddDoc(window.fbCollection(window.fbDb, "orders"), {
                  items: selectedCartItems, total, subtotal, discount, appliedPromo: appliedPromo ? appliedPromo.code : null, paymentId: rzpRes.razorpay_payment_id,
                  orderId: rzpRes.razorpay_order_id, userId: user.uid, userEmail: user.email,
                  userName: shipping.name, shipping, timestamp: new Date(),
                  status: hasPreorderItems ? "Preorder — Awaiting Stock" : "Processing",
                  orderType: hasPreorderItems ? "preorder" : "standard"
                });
                for (const item of selectedCartItems) {
                  if (item.id && !item.isPreorderItem) {
                    try {
                      await window.fbUpdateDoc(window.fbDoc(window.fbDb, "products", item.id), { [`sizeStock.${item.selectedSize}`]: window.fbIncrement(-1) });
                      if (setProducts) setProducts(prev => prev.map(p => {
                        if (p.id === item.id && p.sizeStock && p.sizeStock[item.selectedSize] > 0) return { ...p, sizeStock: { ...p.sizeStock, [item.selectedSize]: p.sizeStock[item.selectedSize] - 1 } };
                        return p;
                      }));
                    } catch (e) { console.error(`Stock decrement failed for ${item.id}`); }
                  }
                }
                if (window.emailjs) {
                  try {
                    await window.emailjs.send("service_wm633dr", "template_xtcij6q", {
                      name: shipping.name, email: user.email,
                      order_id: rzpRes.razorpay_order_id || data.orderId, total,
                      items: selectedCartItems.map(i => `${i.name} (Size: ${i.selectedSize})`).join('\n')
                    });
                  } catch (emailErr) { console.warn("Receipt email failed.", emailErr); }
                }
                notify("Payment successful! Order placed.", "success");
                setCart(prev => prev.filter(item => !selectedIds.includes(item.cartItemId)));
                onClose();
              } catch (dbErr) { notify("Paid but order save failed. Contact support.", "error"); }
            },
            prefill: { email: user.email, contact: "+91" + shipping.phone, name: shipping.name },
            theme: { color: "#111111" }
          };
          new window.Razorpay(options).open();
        } catch (err) { notify("Checkout error: " + err.message, "error"); }
        finally { setLoading(false); }
      };

      const iSt = { display: "block", width: "100%", border: "2px solid rgba(0,0,0,0.14)", background: "#f9f9f9", padding: "12px", fontSize: 13, fontFamily: "Playfair Display" };

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 800 }}>
          <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(17,17,17,0.55)" }} />
          <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: "100%", maxWidth: 400, background: "#fff", borderLeft: "3px solid #111", display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "1.2rem 1.8rem", borderBottom: "2px solid #111", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 20 }}>{step === 'cart' ? `Cart (${cart.length})` : step === 'shipping' ? "Shipping Info" : "Verify Phone"}</span>
              <button onClick={onClose} style={{ background: "none", border: "1.5px solid #111", width: 34, height: 34, fontSize: 14, fontWeight: 700 }}>✕</button>
            </div>
            <div id="recaptcha-container"></div>
            {step === 'cart' && (
              <React.Fragment>
                <div style={{ flex: 1, overflow: "auto", padding: "0.8rem 1.8rem" }}>
                  {cart.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "4rem 0", color: "rgba(0,0,0,0.25)" }}>
                      <img src={LOGO_SRC} alt="" style={{ height: 40, opacity: .15, marginBottom: 12 }} />
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase" }}>Your cart is empty</div>
                    </div>
                  ) : (cart.map((item) => (
                    <div key={item.cartItemId} style={{ display: "flex", gap: "1rem", alignItems: "center", borderBottom: "1px solid rgba(0,0,0,0.07)", padding: "0.9rem 0" }}>
                      <input type="checkbox" checked={selectedIds.includes(item.cartItemId)} onChange={() => toggleSelect(item.cartItemId)} style={{ width: 18, height: 18 }} />
                      <div style={{ width: 58, height: 58, background: "#111", flexShrink: 0, overflow: "hidden", opacity: selectedIds.includes(item.cartItemId) ? 1 : 0.4 }}>
                        {item.frontImage ? <img src={item.frontImage} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,0.15)", fontSize: 18 }}>◎</div>}
                      </div>
                      <div style={{ flex: 1, minWidth: 0, opacity: selectedIds.includes(item.cartItemId) ? 1 : 0.4 }}>
                        <div style={{ fontWeight: 700, fontSize: 12, textTransform: "uppercase", letterSpacing: "0.03em", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item.name}</div>
                        <div style={{ fontSize: 10, color: "#666", marginTop: 2 }}>SIZE: {item.selectedSize}{item.isPreorderItem && <span className="preorder-cart-tag" style={{ marginLeft: 6 }}>PREORDER</span>}</div>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#c00", marginTop: 2 }}>{item.price}</div>
                      </div>
                      <button onClick={() => setCart(c => c.filter(j => j.cartItemId !== item.cartItemId))} style={{ background: "none", border: "1px solid rgba(0,0,0,0.12)", width: 26, height: 26, fontSize: 11, flexShrink: 0 }}>✕</button>
                    </div>
                  )))}
                </div>
                {cart.length > 0 && (
                  <div style={{ padding: "1.2rem 1.8rem", borderTop: "2px solid #111" }}>
                    <div style={{ background: '#111', color: '#fff', padding: '8px', fontSize: '9px', textAlign: 'center', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '1rem' }}>📦 Includes premium packaging & custom stickers</div>
                    {selectedCartItems.some(i => i.isPreorderItem) && (
                      <div style={{ background: '#d4a017', color: '#fff', padding: '8px', fontSize: '9px', textAlign: 'center', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '1rem' }}>⚠️ Contains preorder items — {selectedCartItems.filter(i => i.isPreorderItem).map(i => i.preorderEstimate).filter(Boolean)[0] || 'delivery date TBD'}</div>
                    )}
                    {/* PROMO CODE SECTION */}
                    <div style={{ marginBottom: "1.2rem" }}>
                      {!appliedPromo ? (
                        <div style={{ display: "flex", gap: "8px" }}>
                          <input type="text" placeholder="Promo Code" value={promoInput} onChange={e => setPromoInput(e.target.value.toUpperCase())} style={{ flex: 1, border: "2px solid rgba(0,0,0,0.14)", padding: "8px 12px", fontSize: 11, fontFamily: "Playfair Display", textTransform: "uppercase", letterSpacing: "0.05em", background: "#f9f9f9" }} />
                          <button onClick={handleApplyPromo} disabled={applyingPromo || !promoInput.trim()} style={{ background: "#111", color: "#fff", border: "none", padding: "0 16px", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", opacity: (applyingPromo || !promoInput.trim()) ? 0.6 : 1, cursor: "pointer" }}>{applyingPromo ? "..." : "Apply"}</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#f0fdf4", border: "1px solid #bbf7d0", padding: "8px 12px" }}>
                          <div>
                            <span style={{ fontSize: 10, fontWeight: 800, color: "#166534", letterSpacing: "0.1em" }}>{appliedPromo.code} APPLIED</span>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "#15803d", marginTop: 2 }}>-₹{appliedPromo.discountAmount}</div>
                          </div>
                          <button onClick={removePromo} style={{ background: "none", border: "1px solid rgba(22,101,52,0.3)", padding: "4px 8px", fontSize: 9, color: "#166534", fontWeight: 800, letterSpacing: "0.05em", textTransform: "uppercase", cursor: "pointer" }}>Remove</button>
                        </div>
                      )}
                      {promoErr && <div style={{ color: "#c00", fontSize: 10, fontWeight: 700, marginTop: 8, letterSpacing: "0.05em" }}>{promoErr}</div>}
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: appliedPromo ? "0.4rem" : "0.9rem" }}>
                      <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(0,0,0,0.6)", textTransform: "uppercase" }}>Subtotal ({selectedCartItems.length} items)</span>
                      <span style={{ fontSize: 12, fontWeight: 600 }}>₹{subtotal.toLocaleString("en-IN")}</span>
                    </div>
                    {appliedPromo && (
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.9rem", color: "#166534" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase" }}>Discount ({appliedPromo.code})</span>
                        <span style={{ fontSize: 12, fontWeight: 800 }}>-₹{discount.toLocaleString("en-IN")}</span>
                      </div>
                    )}
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.9rem", borderTop: appliedPromo ? "1px solid rgba(0,0,0,0.08)" : "none", paddingTop: appliedPromo ? "0.6rem" : 0 }}>

    function ImgUpload({ value, onChange, label }) {
      const ref = useRef();
      const [drag, setDrag] = useState(false);
      const [compressing, setCompressing] = useState(false);
      const read = async (file) => {
        if (!file) return;
        setCompressing(true);
        const reader = new FileReader();
        reader.onload = async (e) => { const compressed = await compressImage(e.target.result); onChange(compressed); setCompressing(false); };
        reader.readAsDataURL(file);
      };
      return (
        <div>
          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", marginBottom: 7 }}>{label}</div>
          <div className={`drop-zone${drag ? " over" : ""}`} onClick={() => ref.current?.click()} onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)} onDrop={e => { e.preventDefault(); setDrag(false); read(e.dataTransfer.files[0]); }} style={{ border: "2px dashed rgba(0,0,0,0.18)", padding: "0.9rem", textAlign: "center", background: drag ? "rgba(0,0,0,0.03)" : "#fafafa", minHeight: 110, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
            {compressing ? (
              <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(0,0,0,0.4)" }}>Compressing…</span>
            ) : value ? (
              <React.Fragment>
                <img src={value} alt="" style={{ maxHeight: 90, maxWidth: "100%", objectFit: "contain" }} />
                <button onClick={e => { e.stopPropagation(); onChange(null); }} style={{ background: "#111", color: "#fff", border: "none", fontSize: 8, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", padding: "3px 9px" }}>Remove</button>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <svg width="28" height="28" viewBox="0 0 28 28" style={{ opacity: .3 }}><path d="M14 3L14 19M7 10L14 3L21 10" stroke="#111" strokeWidth="1.8" fill="none" /><path d="M3 21L3 25L25 25L25 21" stroke="#111" strokeWidth="1.8" fill="none" /></svg>
                <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(0,0,0,0.35)" }}>Click or drag image</span>
                <span style={{ fontSize: 9, color: "rgba(0,0,0,0.22)" }}>Auto-compressed</span>
              </React.Fragment>
            )}
            <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={e => read(e.target.files[0])} />
          </div>
        </div>
      );
    }

                const sevenDays = 7 * 24 * 60 * 60 * 1000;

                for (const d of snap.docs) {
                  const data = d.data();
                  let shouldDelete = false;
                  if (data.status === "Delivered" && data.deliveredAt) {
                    const deliveredTime = data.deliveredAt.seconds ? data.deliveredAt.seconds * 1000 : (data.deliveredAt.getTime ? data.deliveredAt.getTime() : 0);
                    if (deliveredTime > 0 && (now - deliveredTime) > sevenDays) shouldDelete = true;
                  }
                  if (shouldDelete) { try { await window.fbDeleteDoc(window.fbDoc(window.fbDb, "orders", d.id)); } catch (e) { console.error("Auto-delete failed", e); } }
                  else validOrders.push({ id: d.id, ...data });
                }
                setOrders(validOrders);
              } catch (e) { console.error(e); }
            };
            fetchOrders();
          }
          if (tab === "messages") {
            window.fbGetDocs(window.fbQuery(window.fbCollection(window.fbDb, "messages"), window.fbOrderBy("timestamp", "desc")))
              .then(snap => { const m = []; snap.forEach(d => m.push({ id: d.id, ...d.data() })); setMessages(m); })
              .catch(e => console.error(e));
          }
          if (tab === "promos") {
            window.fbGetDocs(window.fbQuery(window.fbCollection(window.fbDb, "promos"), window.fbOrderBy("code")))
              .then(snap => { const p = []; snap.forEach(d => p.push({ id: d.id, ...d.data() })); setPromos(p); })
              .catch(e => console.error(e));
          }
        }
      }, [authed, tab]);

      const login = async () => {
        try {
          if (!window.fbAuth) throw new Error("Firebase Auth not connected.");
          setPwErr("");
          const res = await window.fbSignInWithEmailAndPassword(window.fbAuth, email, pw);
          if (res.user.email !== ADMIN_EMAIL) {
            setPwErr("Not authorized as Admin.");
            await window.fbSignOut(window.fbAuth);
            setAuthed(false);
          }
        } catch (err) { setPwErr(err.message.replace("Firebase: ", "")); }
      };

      const handleSizesChange = (v) => {
        const arr = v.split(',').map(s => s.trim()).filter(Boolean);
        const newStock = {};
        arr.forEach(s => { newStock[s] = form.sizeStock?.[s] ?? 10; });
        setForm({ ...form, sizes: v, sizeStock: newStock });
      };

      const saveProduct = async () => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!form.name || !form.price) { notify("Name & price required.", "error"); return; }
        setSaving(true);
        const newId = editId === "new" ? "prod-" + Date.now() : editId;
        const updated = { ...form, id: newId };
        try {
          if (!window.fbDb || !window.fbSetDoc) throw new Error("Firebase not connected.");
          await withTimeout(window.fbSetDoc(window.fbDoc(window.fbDb, "products", newId), updated, { merge: true }));
          setProducts(editId === "new" ? [...products, updated] : products.map(p => p.id === editId ? updated : p));
          setEditId(null); setForm(blankProduct);
          notify("Product saved.", "success");
        } catch (err) { notify("Save failed: " + err.message, "error"); }
        setSaving(false);
      };

      const savePortItem = async () => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!portForm.label) { notify("Title required.", "error"); return; }
        setSaving(true);
        const newId = portEditId === "new" ? "port-" + Date.now() : portEditId;
        const updated = { ...portForm, id: newId };
        try {
          if (!window.fbDb || !window.fbSetDoc) throw new Error("Firebase not connected.");
          await withTimeout(window.fbSetDoc(window.fbDoc(window.fbDb, "portfolio", newId), updated, { merge: true }));
          setPortfolio(portEditId === "new" ? [...portfolio, updated] : portfolio.map(p => p.id === portEditId ? updated : p));
          setPortEditId(null); setPortForm(blankPort);
          notify("Portfolio item saved.", "success");
        } catch (err) { notify("Save failed: " + err.message, "error"); }
        setSaving(false);
      };

      const removeProduct = async (id) => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!window.confirm("Delete product globally?")) return;
        try {
          await window.fbDeleteDoc(window.fbDoc(window.fbDb, "products", id));
          setProducts(products.filter(p => p.id !== id));
          if (editId === id) { setEditId(null); setForm(blankProduct); }
        } catch (err) { notify("Delete failed: " + err.message, "error"); }
      };

      const removePortItem = async (id) => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!window.confirm("Delete portfolio item?")) return;
        try {
          await window.fbDeleteDoc(window.fbDoc(window.fbDb, "portfolio", id));
          setPortfolio(portfolio.filter(p => p.id !== id));
          if (portEditId === id) { setPortEditId(null); setPortForm(blankPort); }
        } catch (err) { notify("Delete failed: " + err.message, "error"); }
      };

      const removeMessage = async (id) => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!window.confirm("Delete this message?")) return;
        try {
          await window.fbDeleteDoc(window.fbDoc(window.fbDb, "messages", id));
          setMessages(messages.filter(m => m.id !== id));
        } catch (err) { notify("Delete failed: " + err.message, "error"); }
      };

      const savePromo = async () => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!window.confirm("Save this promo code?")) return;
        setSaving(true);
        const codeUpper = promoForm.code.toUpperCase().trim();
        const newId = promoEditId === "new" ? "promo-" + Date.now() : promoEditId;
        const updated = { ...promoForm, code: codeUpper, id: newId };
        try {
          if (!window.fbDb || !window.fbSetDoc) throw new Error("Firebase not connected.");
          await withTimeout(window.fbSetDoc(window.fbDoc(window.fbDb, "promos", newId), updated, { merge: true }));

          notify("Promo code saved.", "success");
        } catch (err) { notify("Save failed: " + err.message, "error"); }
        setSaving(false);

      const removePromo = async (id) => {
        if (!isAdmin()) { notify("Unauthorized.", "error"); return; }
        if (!window.confirm("Delete this promo code?")) return;
        try {
          await window.fbDeleteDoc(window.fbDoc(window.fbDb, "promos", id));
          setPromos(promos.filter(p => p.id !== id));
          if (promoEditId === id) { setPromoEditId(null); setPromoForm(blankPromo); }
        } catch (err) { notify("Delete failed: " + err.message, "error"); }
      };

      const iSt = { display: "block", width: "100%", border: "2px solid rgba(0,0,0,0.14)", background: "#fff", padding: "10px 12px", fontSize: 13, fontFamily: "Playfair Display" };

                          <button onClick={e => { e.stopPropagation(); removeProduct(p.id); }} style={{ fontSize: 7, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", padding: "2px 5px", background: "transparent", color: "rgba(180,0,0,0.55)", border: "1px solid rgba(180,0,0,0.18)" }}>Delete</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {editId && (
                  <div style={{ padding: "2rem", background: "#fafafa", border: "2px solid #111" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1.8rem" }}>
                      <h3 style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 22 }}>{editId === "new" ? "New Product" : "Edit Product"}</h3>
                      <button onClick={() => { setEditId(null); setForm(blankProduct); }} style={{ background: "none", border: "1.5px solid #111", width: 34, height: 34, fontSize: 13, fontWeight: 700 }}>✕</button>
                    </div>
                    <div className="admin-form-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1.3rem" }}>
                      <div style={{ gridColumn: "1/-1" }}><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Product Name *</label><input className="admin-input" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Terrain Tee 001" style={iSt} /></div>
                      <div><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Old Price</label><input className="admin-input" value={form.compareAtPrice || ""} onChange={e => setForm({ ...form, compareAtPrice: e.target.value })} placeholder="₹1,100" style={iSt} /></div>
                      <div><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Active Price *</label><input className="admin-input" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} placeholder="₹1" style={iSt} /></div>
                      <div><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Tag</label><input className="admin-input" value={form.tag} onChange={e => setForm({ ...form, tag: e.target.value })} placeholder="New Drop" style={iSt} /></div>
                      <div style={{ gridColumn: "1/-1" }}><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Category</label><input className="admin-input" value={form.category} onChange={e => setForm({ ...form, category: e.target.value })} placeholder="T-Shirts" style={iSt} /></div>
                      <div style={{ gridColumn: "1/-1" }}><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Sizes (comma-separated)</label><input className="admin-input" value={form.sizes} onChange={e => handleSizesChange(e.target.value)} placeholder="S, M, L, XL" style={iSt} /></div>
                      {sizeArr.length > 0 && (

                          <label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 10 }}>Stock Per Size *</label>

                            {sizeArr.map(s => (
                              <div key={s}>

                                <input type="number" min="0" className="admin-input" value={form.sizeStock?.[s] ?? 0} onChange={e => setForm({ ...form, sizeStock: { ...form.sizeStock, [s]: parseInt(e.target.value) || 0 } })} style={{ ...iSt, textAlign: "center", fontWeight: 700 }} />

                      <div style={{ gridColumn: "1/-1" }}><label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(0,0,0,0.4)", display: "block", marginBottom: 6 }}>Description</label><textarea className="admin-input" rows={3} value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Short description..." style={{ ...iSt, resize: "none" }} /></div>

    function PortCard({ w, idxBase }) {
      const [curIdx, setCurIdx] = useState(0);
      const images = w.images && w.images.length > 0 ? w.images : (w.image ? [w.image] : []);
      const next = (e) => { e.stopPropagation(); setCurIdx((i) => (i + 1) % images.length); };
      const prev = (e) => { e.stopPropagation(); setCurIdx((i) => (i - 1 + images.length) % images.length); };
      let startX = 0;
      const handleTouchStart = (e) => { startX = e.touches[0].clientX; };
      const handleTouchEnd = (e) => { const diff = startX - e.changedTouches[0].clientX; if (diff > 40) next(e); if (diff < -40) prev(e); };

      return (
        <div className={`port-card reveal reveal-d${(idxBase % 3) + 1}`} style={{ position: "relative", background: "#111", aspectRatio: "1/1", overflow: "hidden", border: "2px solid #111" }} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
          {images.length > 0 ? (
            <React.Fragment>
              <img src={images[curIdx]} alt={w.label} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", opacity: 0.7, transition: "opacity 0.3s" }} />
              {images.length > 1 && (
                <React.Fragment>
                  <button className="carousel-btn left" onClick={prev}>‹</button>
                  <button className="carousel-btn right" onClick={next}>›</button>
                  <div style={{ position: 'absolute', bottom: '10px', left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: '4px', zIndex: 20 }}>
                    {images.map((_, i) => <div key={i} style={{ width: '6px', height: '6px', borderRadius: '50%', background: i === curIdx ? '#fff' : 'rgba(255,255,255,0.3)' }} />)}
                  </div>
                </React.Fragment>
              )}
            </React.Fragment>
          ) : (
            <div style={{ position: "absolute", inset: 0, opacity: 0.13 }}>
              <svg viewBox="0 0 280 280" width="100%" height="100%">
                {[50, 80, 110, 140, 170, 200, 230].map((y, j) => <path key={j} d={`M0,${y} Q70,${y - 14} 140,${y} T280,${y - 8}`} fill="none" stroke="#fff" strokeWidth="0.75" />)}
                <ellipse cx="140" cy="140" rx={85 - idxBase * 3} ry={38} fill="none" stroke="#fff" strokeWidth="0.75" />
              </svg>
            </div>
          )}
          <div style={{ position: "absolute", top: "1rem", left: "1rem", fontFamily: "Playfair Display", fontWeight: 900, fontSize: 32, color: "rgba(255,255,255,0.06)", letterSpacing: "-0.05em", lineHeight: 1, zIndex: 10 }}>0{idxBase + 1}</div>
          <div className="port-overlay" style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.78)", display: "flex", flexDirection: "column", justifyContent: "flex-end", padding: "1.5rem", pointerEvents: "none" }}>
            <span className="port-text" style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(255,255,255,0.5)", marginBottom: 5 }}>{w.cat}</span>
            <p className="port-text" style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: 18, color: "#fff" }}>{w.label}</p>
          </div>
        </div>
      );
    }

    function Contact() {
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const [sent, setSent] = useState(false);
      const [loading, setLoading] = useState(false);
      const [errMsg, setErrMsg] = useState("");
      
      const sanitizeInput = (str) => {
        if (typeof str !== 'string') return '';
        return str.replace(/[<>'"]/g, '');
      };

      const submit = async (e) => {
        e.preventDefault();
        
        let sName = sanitizeInput(form.name).trim();
        let sEmail = sanitizeInput(form.email).trim();
        let sMessage = sanitizeInput(form.message).trim();

        if (sName.length < 2 || sName.length > 200) { setErrMsg("Name must be between 2 and 200 characters."); return; }
        if (!/^[^@]+@[^@]+\.[^@]+$/.test(sEmail)) { setErrMsg("Please enter a valid email address."); return; }
        if (sMessage.length > 500) { setErrMsg("Message cannot exceed 500 characters."); return; }
        if (!sName || !sEmail || !sMessage) { setErrMsg("All fields are required."); return; }

        const lastSubmit = sessionStorage.getItem("lastSubmit_contact");
        if (lastSubmit && (Date.now() - parseInt(lastSubmit) < 30000)) {
          setErrMsg("Please wait before submitting again."); return;
        }

        setLoading(true); setErrMsg("");
        try {
          if (!window.fbAddDoc || !window.fbDb) throw new Error("Firebase is not connected.");
          await withTimeout(window.fbAddDoc(window.fbCollection(window.fbDb, "messages"), { name: sName, email: sEmail, message: sMessage, timestamp: new Date() }));
          if (window.emailjs) { try { await window.emailjs.send("service_wm633dr", "template_igjj8ga", { name: sName, email: sEmail, message: sMessage }); } catch (emailErr) {} }
          
          sessionStorage.setItem("lastSubmit_contact", Date.now().toString());
          
          setSent(true); setTimeout(() => setSent(false), 5000);
          setForm({ name: "", email: "", message: "" });
        } catch (err) {
          setErrMsg(err.code === "permission-denied" ? "Firebase permission denied." : "Failed to send: " + err.message);
        } finally { setLoading(false); }
      };
      const iSt = { display: "block", width: "100%", background: "transparent", border: "none", borderBottom: "2px solid #333", color: "#fff", padding: "15px", fontFamily: "Playfair Display", marginBottom: "1rem" };
      return (
        <section id="contact" style={{ background: "#111", borderBottom: "3px solid #111", padding: "6rem 2rem", position: "relative", overflow: "hidden" }}>
          <div className="topo-parallax-wrap" style={{ opacity: 0.07 }}><TopoSVG color="#fff" /></div>
          <div style={{ position: "relative", zIndex: 1 }}>
            <SLabel inv>Contact — Get In Touch</SLabel>
            <div className="contact-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "5rem", alignItems: "start" }}>
              <div className="reveal">
                <h2 className="dyn-title" style={{ fontFamily: "Playfair Display", fontWeight: 700, fontSize: "clamp(54px,9vw,120px)", lineHeight: 0.88, color: "#fff", marginBottom: "2.5rem", fontStyle: "italic" }}>Contact Us.</h2>
                {errMsg && <div style={{ background: "#c00", color: "#fff", padding: "12px 16px", fontSize: 11, fontWeight: 700, marginBottom: "1.5rem", lineHeight: 1.5 }}>{errMsg}</div>}
                {sent ? (
                  <div style={{ border: "2px solid rgba(255,255,255,0.2)", padding: "2rem", textAlign: "center" }}>
                    <p style={{ fontWeight: 700, letterSpacing: "0.12em", color: "#fff", textTransform: "uppercase", fontSize: 12 }}>Message received. We'll be in touch.</p>
                  </div>
                ) : (
                  <form onSubmit={submit}>
                    <input type="text" placeholder="Name" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} style={iSt} />
                    <input type="email" placeholder="Email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} style={iSt} />
                    <textarea placeholder="Message" value={form.message} rows={4} onChange={e => setForm({ ...form, message: e.target.value })} style={{ ...iSt, resize: "none" }} />
                    <button type="submit" disabled={loading} style={{ background: "#fff", color: "#111", border: "3px solid #fff", padding: "15px 40px", fontSize: 11, fontWeight: 900, letterSpacing: "0.2em", textTransform: "uppercase", marginTop: "1rem" }}>{loading ? "Sending..." : "Send Message →"}</button>
                  </form>
                )}
              </div>
              <div className="reveal reveal-d2">
                <p style={{ fontSize: 18, lineHeight: 2, color: "rgba(255,255,255,0.45)", marginBottom: "2rem", paddingBottom: "2rem", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>Feel free to contact us with any questions or concerns. You can use the form or email us directly. We also create custom hoodies and tees please hit us up for inquiries.</p>
                {[{ l: "Email", v: "splotchglobal@gmail.com" }, { l: "Phone", v: "+91 9900605101" }, { l: "Hours", v: "Mon–Fri, 10am–6pm IST" }].map(item => (
                  <div key={item.l} style={{ borderBottom: "1px solid rgba(255,255,255,0.07)", padding: "1.2rem 0", display: "flex", justifyContent: "space-between", gap: "1rem" }}>
                    <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(255,255,255,0.22)", flexShrink: 0 }}>{item.l}</span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.55)", textAlign: "right" }}>{item.v}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ══════════════════════════════════════
       APP — with loader state machine
    ══════════════════════════════════════ */
    function App() {
      const [products, setProducts] = useState([]);
      const [portfolio, setPortfolio] = useState([]);
      const [cart, setCart] = useState(() => { try { const d = localStorage.getItem('splotch_cart_v1'); return d ? JSON.parse(d) : []; } catch { return []; } });
      const [qv, setQV] = useState(null);
      const [adminOpen, setAdminOpen] = useState(false);
      const [cartOpen, setCartOpen] = useState(false);
      const [authOpen, setAuthOpen] = useState(false);
      const [ordersOpen, setOrdersOpen] = useState(false);
      const [mobMenu, setMobMenu] = useState(false);
      const [filter, setFilter] = useState("All");
      const [logoClicks, setLogoClicks] = useState(0);
      const [user, setUser] = useState(null);
      const [toasts, setToasts] = useState([]);
      const logoTimerRef = useRef(null);
      const secretKeyBufferRef = useRef("");

      const dismissToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      const notify = useCallback((message, type = "info") => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 5000);
      }, []);

      // ── Loader state ──
      const [loaderProgress, setLoaderProgress] = useState(0);
      const [loaderStatus, setLoaderStatus] = useState("INITIALIZING...");
      const [loaderOpening, setLoaderOpening] = useState(false);
      const [loaderDone, setLoaderDone] = useState(false);
      const dataReadyRef = useRef(false);
      const minTimeRef = useRef(false);

      const BOOT_SEQUENCE = [
        { p: 15, t: 0, s: "INITIALIZING SYSTEM..." },
        { p: 35, t: 420, s: "CONNECTING TO DATABASE..." },
        { p: 55, t: 820, s: "FETCHING COLLECTION 001..." },
        { p: 75, t: 1300, s: "AUTHENTICATING SESSION..." },
        { p: 90, t: 1700, s: "LOADING ASSETS..." },
        { p: 100, t: 2100, s: "READY." },
      ];

      // Run the boot progress animation
      useEffect(() => {
        BOOT_SEQUENCE.forEach(({ p, t, s }) => {
          setTimeout(() => { setLoaderProgress(p); setLoaderStatus(s); }, t);
        });
        // Minimum display time: 2.4s
        setTimeout(() => {
          minTimeRef.current = true;
          if (dataReadyRef.current) triggerOpen();
        }, 2400);
      }, []);

      const triggerOpen = () => {
        setLoaderProgress(100);
        setLoaderStatus("READY.");
        setTimeout(() => {
          setLoaderOpening(true);
          setTimeout(() => setLoaderDone(true), 800);
        }, 300);
      };

      // ── Updated Easter Egg console.log ──
      useEffect(() => {
        console.log(
          "%c" +
          "  ╭─────────────────────────────────────────────────────────╮\n" +
          "  │engineered by                                            │\n" +
          "  |                                                         │\n" +
          "  │   █████╗ ██╗     ██╗  ██╗██╗███████╗███╗   ███╗         │\n" +
          "  │  ██╔══██╗██║     ██║  ██║██║██╔════╝████╗ ████║         │\n" +
          "  │  ███████║██║     ███████║██║█████╗  ██╔████╔██║         │\n" +
          "  │  ██╔══██║██║     ██╔══██║██║██╔══╝  ██║╚██╔╝██║         │\n" +
          "  │  ██║  ██║███████╗██║  ██║██║███████╗██║ ╚═╝ ██║         │\n" +
          "  │  ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝╚══════╝╚═╝     ╚═╝         │\n" +
          "  │                                                         │\n" +
          "  │  ▸ splotch.in                                           │\n" +
          "  │  ▸ zero mass production                                 │\n" +
          "  ╰─────────────────────────────────────────────────────────╯",
          "color: #d4863a; font-family: 'Playfair Display', serif; font-size: 11px; line-height: 1.4;"
        );
      }, []);

      useEffect(() => { try { localStorage.setItem('splotch_cart_v1', JSON.stringify(cart)); } catch { } }, [cart]);

      useEffect(() => {
        const initData = async () => {
          if (!window.fbDb || !window.fbGetDocs) {
            dataReadyRef.current = true;
            if (minTimeRef.current) triggerOpen();
            return;
          }
          try {
            const snap = await window.fbGetDocs(window.fbCollection(window.fbDb, "products"));
            if (snap.empty) {
              DEFAULT_PRODUCTS.forEach(p => window.fbSetDoc(window.fbDoc(window.fbDb, "products", p.id), p).catch(() => { }));
              setProducts(DEFAULT_PRODUCTS);
            } else {
              const fetched = [];
              snap.forEach(d => fetched.push({ id: d.id, ...d.data() }));
              setProducts(fetched);
            }
            const portSnap = await window.fbGetDocs(window.fbCollection(window.fbDb, "portfolio"));
            if (portSnap.empty) {
              DEFAULT_PORTFOLIO.forEach(p => window.fbSetDoc(window.fbDoc(window.fbDb, "portfolio", p.id), p).catch(() => { }));
              setPortfolio(DEFAULT_PORTFOLIO);
            } else {
              const fetchedPort = [];
              portSnap.forEach(d => fetchedPort.push({ id: d.id, ...d.data() }));
              setPortfolio(fetchedPort);
            }
          } catch (e) {
            console.error("Data load error:", e);
            setProducts(DEFAULT_PRODUCTS);
            setPortfolio(DEFAULT_PORTFOLIO);
          } finally {
            dataReadyRef.current = true;
            if (minTimeRef.current) triggerOpen();
          }
        };

        if (window.fbDb) initData();
        else {
          window.addEventListener('firebase-ready', initData, { once: true });
          // Fallback: if firebase never fires, still open after 3.5s
          setTimeout(() => {
            if (!dataReadyRef.current) {
              setProducts(DEFAULT_PRODUCTS);
              setPortfolio(DEFAULT_PORTFOLIO);
              dataReadyRef.current = true;
              if (minTimeRef.current) triggerOpen();
            }
          }, 3500);
        }
      }, []);

      useEffect(() => {
        const initAuth = () => { if (window.fbAuth) window.fbOnAuthStateChanged(window.fbAuth, u => setUser(u)); };
        if (window.fbAuth) initAuth();
        else window.addEventListener('firebase-ready', initAuth, { once: true });
      }, []);

      useEffect(() => {
        const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); }), { threshold: 0.1 });
        document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
        return () => obs.disconnect();
      });

      useEffect(() => {
        const secret = "splotch";
        const onKeyDown = (e) => {
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          if (e.key === "Escape") {
            secretKeyBufferRef.current = "";
            return;
          }
          if (e.key.length !== 1) return;

          const next = (secretKeyBufferRef.current + e.key.toLowerCase()).slice(-secret.length);
          secretKeyBufferRef.current = next;
          if (next === secret) {
            setAuthOpen(false);
            setAdminOpen(true);
            secretKeyBufferRef.current = "";
          }
        };

        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, []);

      const handleLogoClick = () => {
        const next = logoClicks + 1;
        setLogoClicks(next);
        if (logoTimerRef.current) clearTimeout(logoTimerRef.current);
        if (next >= 6) { setAdminOpen(true); setLogoClicks(0); return; }
        logoTimerRef.current = setTimeout(() => setLogoClicks(0), 3000);
      };

      const addToCart = useCallback(item => setCart(c => [...c, { ...item, cartItemId: Date.now() + Math.random() }]), []);

      return (
        <div style={{ minHeight: "100vh", background: "#fff", position: "relative", overflowX: "hidden" }}>
          {/* ── Loader ── */}
          <ShopLoader
            progress={loaderProgress}
            status={loaderStatus}
            opening={loaderOpening}
            done={loaderDone}
          />

          <div className="grain-overlay" />
          <ScrollProgress />
          <Header cartCount={cart.length} onCartOpen={() => setCartOpen(true)} onLogoClick={handleLogoClick} setMobMenu={setMobMenu} user={user} onAuthClick={() => setAuthOpen(true)} handleLogout={() => window.fbSignOut(window.fbAuth)} openUserOrders={() => setOrdersOpen(true)} />
          <Ticker />
          <MobMenu open={mobMenu} setOpen={setMobMenu} user={user} onAuthClick={() => setAuthOpen(true)} handleLogout={() => window.fbSignOut(window.fbAuth)} openUserOrders={() => setOrdersOpen(true)} />
          <Shop products={products} onQV={setQV} onAdd={addToCart} filter={filter} setFilter={setFilter} />
          <TheWork portfolio={portfolio} />
          <WhySplotch />
          <Testimonials />
          <Contact />
          <Footer />

          {qv && <QuickView product={qv} onClose={() => setQV(null)} onAdd={addToCart} />}
          {cartOpen && <CartSidebar cart={cart} setCart={setCart} onClose={() => setCartOpen(false)} user={user} onAuthClick={() => setAuthOpen(true)} setProducts={setProducts} notify={notify} />}
          {adminOpen && <AdminPanel products={products} setProducts={setProducts} portfolio={portfolio} setPortfolio={setPortfolio} onClose={() => setAdminOpen(false)} notify={notify} />}
          {authOpen && <AuthModal onClose={() => setAuthOpen(false)} onSuccess={() => setAuthOpen(false)} onSecretAdminOpen={() => { setAuthOpen(false); setAdminOpen(true); }} />}
          {ordersOpen && user && <UserOrdersModal user={user} onClose={() => setOrdersOpen(false)} />}

          <div className="toast-stack">
            {toasts.map(t => (
              <div key={t.id} className={`toast-card ${t.type || "info"}`}>
                <div className="toast-text">{t.message}</div>
                <button className="toast-close" onClick={() => dismissToast(t.id)} aria-label="Dismiss notification">✕</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function () {
      var cvs = document.getElementById('liquid-cursor-canvas');
      if (!cvs) return;
      var ctx = cvs.getContext('2d');
      var BASE_R = 8, EASE = 0.35, MAX_STRETCH = 26, MIN_SQUASH = 3;
      var currentR = BASE_R;
      var mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      var drop = { x: mouse.x, y: mouse.y };
      var isClicking = false;
      function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', function (e) { mouse.x = e.clientX; mouse.y = e.clientY; });
      window.addEventListener('mousedown', function () { isClicking = true; });
      window.addEventListener('mouseup', function () { isClicking = false; });
      window.addEventListener('touchstart', function () { isClicking = true; });
      window.addEventListener('touchend', function () { isClicking = false; });
      (function animate() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        var targetR = isClicking ? BASE_R * 0.35 : BASE_R;
        currentR += (targetR - currentR) * 0.4;
        var dx = mouse.x - drop.x, dy = mouse.y - drop.y;
        drop.x += dx * EASE; drop.y += dy * EASE;
        var speed = Math.sqrt(dx * dx + dy * dy);
        var angle = Math.atan2(dy, dx);
        var stretch = Math.min(speed * 0.40, MAX_STRETCH);
        if (isClicking) stretch *= 0.1;
        var majorR = currentR + stretch * 0.5;
        var minorR = Math.max(currentR - speed * 0.10, MIN_SQUASH);
        ctx.save();
        ctx.translate(drop.x, drop.y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(-(stretch * 0.5), 0, majorR, minorR, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.restore();
        requestAnimationFrame(animate);
      })();
    })();
  </script>
