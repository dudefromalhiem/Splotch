<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Splotch | The Archive</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================
       1. CORE AESTHETICS & RESET
       ========================================== */
    :root {
      --ash: #111111;
      --red: #DC1C1C;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html { 
      width: 100vw;
      height: 100vh;
      overflow: hidden; 
      background: var(--ash); 
      font-family: 'Inter', sans-serif;
      touch-action: none; /* Prevents mobile pull-to-refresh while dragging 3D */
    }

    /* DESKTOP: Hide default cursor, show liquid canvas */
    @media (pointer: fine) {
      body, html, * { 
        cursor: none !important; 
      }
    }

    /* MOBILE/TOUCH: Restore default touch behavior, hide liquid canvas */
    @media (pointer: coarse) {
      body, html, * { 
        cursor: default !important; 
      }
      #liquid-cursor-canvas { 
        display: none !important; 
      }
    }

    /* ==========================================
       2. SIGNATURE GRAIN OVERLAY
       ========================================== */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.12;
      background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
    }

    /* ==========================================
       3. REACTIVE 3D GRID BACKGROUND
       ========================================== */
    #grid-wrapper {
      position: absolute;
      inset: 0;
      z-index: 0;
      perspective: 1000px;
      overflow: hidden;
    }
    
    #grid-plane {
      position: absolute;
      inset: -50%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      transform-origin: center center;
      will-change: transform;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    /* ==========================================
       4. MASSIVE LOGO WATERMARK
       ========================================== */
    #massive-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65vmin; /* Takes up > 50% of the screen */
      height: auto;
      opacity: 0.04; /* Very subtle and ominous */
      filter: invert(1); /* Turns it white to contrast ash background */
      z-index: 1;
      pointer-events: none;
    }

    /* ==========================================
       5. CYBERSIGILISM ART CANVAS
       ========================================== */
    #sigil-canvas {
      position: absolute;
      inset: 0;
      z-index: 2; /* Sits above logo, below 3D text */
      pointer-events: none;
    }

    /* ==========================================
       6. THREE.JS & LIQUID CURSOR
       ========================================== */
    #three-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    #liquid-cursor-canvas {
      position: absolute;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    /* ==========================================
       7. UI LAYER
       ========================================== */
    .ui-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 12vh;
      pointer-events: none;
      will-change: transform;
    }

    .maintenance-msg {
      color: rgba(255, 255, 255, 0.6);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sub-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(255, 255, 255, 0.25);
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="grain"></div>
  
  <div id="grid-wrapper">
    <div id="grid-plane"></div>
  </div>

  <img src="logosource.png" id="massive-logo" alt="Splotch Background Logo" onerror="this.style.display='none'">

  <canvas id="sigil-canvas"></canvas>

  <div id="three-canvas"></div>

  <canvas id="liquid-cursor-canvas"></canvas>

  <div class="ui-layer" id="ui-layer">
    <div class="maintenance-msg">Welcome to the official Splotch website. Splotch is an independent streetwear clothing brand engineered in Bangalore, India. Created in 2026 by 3 guys. Shop premium oversized t-shirts, limited drops, and contemporary fashion.</div>
    <div class="sub-msg">Style beyond seasons.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // =========================================================================
    // 1. GLOBAL MOUSE STATE & DRAG LOGIC
    // =========================================================================
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let isClicking = false;
    let isDragging = false;
    
    let lastDrag = { x: 0, y: 0 };
    let targetDragRot = { x: -0.15, y: 0 };
    let currentDragRot = { x: -0.15, y: 0 }; 
    let autoSpinY = 0; // The continuous 360 spin variable
    
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      // Calculate Parallax for Grid and UI
      const rotX = (mouse.y - centerY) * -0.015;
      const rotY = (mouse.x - centerX) * 0.015;
      document.getElementById('grid-plane').style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(-50px)`;
      document.getElementById('ui-layer').style.transform = `translate(${(mouse.x - centerX) * -0.02}px, ${(mouse.y - centerY) * -0.02}px)`;

      // Calculate Rotation Math for 3D Text Dragging
      if (isDragging) {
        let dx = e.clientX - lastDrag.x;
        let dy = e.clientY - lastDrag.y;
        targetDragRot.y += dx * 0.008;
        targetDragRot.x += dy * 0.008;
        
        // Limit vertical tilt so it doesn't flip upside down completely
        targetDragRot.x = Math.max(-0.6, Math.min(0.6, targetDragRot.x));
        
        lastDrag.x = e.clientX;
        lastDrag.y = e.clientY;
      }
    });

    // Desktop Dragging
    window.addEventListener('mousedown', (e) => {
      isClicking = true;
      isDragging = true;
      lastDrag.x = e.clientX;
      lastDrag.y = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      isClicking = false;
      isDragging = false;
    });

    // Mobile Touch Dragging
    window.addEventListener('touchstart', (e) => {
      isClicking = true;
      isDragging = true;
      let touch = e.touches[0];
      lastDrag.x = touch.clientX;
      lastDrag.y = touch.clientY;
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
      let touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      
      if (isDragging) {
        let dx = touch.clientX - lastDrag.x;
        let dy = touch.clientY - lastDrag.y;
        targetDragRot.y += dx * 0.012;
        targetDragRot.x += dy * 0.012;
        
        targetDragRot.x = Math.max(-0.6, Math.min(0.6, targetDragRot.x));
        
        lastDrag.x = touch.clientX;
        lastDrag.y = touch.clientY;
      }
    }, {passive: false});

    window.addEventListener('touchend', () => {
      isClicking = false;
      isDragging = false;
    });

    // =========================================================================
    // 2. PROCEDURAL CYBERSIGILISM ARTWORK
    // =========================================================================
    const sigilCanvas = document.getElementById('sigil-canvas');
    const sCtx = sigilCanvas.getContext('2d');
    let sigilTime = 0;

    function resizeSigil() {
      sigilCanvas.width = window.innerWidth;
      sigilCanvas.height = window.innerHeight;
    }
    resizeSigil();
    window.addEventListener('resize', resizeSigil);

    function drawCybersigil() {
      sCtx.clearRect(0, 0, sigilCanvas.width, sigilCanvas.height);
      const cx = sigilCanvas.width / 2;
      const cy = sigilCanvas.height / 2;

      // Make the entire sigil pulse dynamically
      const pulse = Math.sin(sigilTime * 2) * 0.3 + 0.7; // Fluctuates opacity

      sCtx.shadowColor = '#DC1C1C';
      sCtx.shadowBlur = 18;
      sCtx.strokeStyle = `rgba(220, 28, 28, ${0.4 * pulse})`;
      sCtx.lineWidth = 1.5;
      
      // Draw 6 symmetrical sharp thorny branches
      for (let i = 0; i < 6; i++) {
        sCtx.save();
        sCtx.translate(cx, cy);
        sCtx.rotate((Math.PI * 2 / 6) * i + Math.sin(sigilTime * 0.5) * 0.1); // Slow subtle rotation

        // Main primary razor stroke
        sCtx.beginPath();
        sCtx.moveTo(0, 0);
        sCtx.lineTo(-10, -50);
        sCtx.lineTo(-5, -80);
        sCtx.lineTo(-30, -120);
        sCtx.lineTo(-15, -170);
        sCtx.lineTo(-45, -250);
        sCtx.stroke();

        // Inner intersecting branches
        sCtx.beginPath();
        sCtx.moveTo(-5, -80);
        sCtx.lineTo(25, -110);
        sCtx.lineTo(10, -150);
        sCtx.stroke();

        // Mirror the exact stroke to create perfect bilateral symmetry per branch
        sCtx.scale(-1, 1);
        sCtx.beginPath();
        sCtx.moveTo(0, 0);
        sCtx.lineTo(-10, -50);
        sCtx.lineTo(-5, -80);
        sCtx.lineTo(-30, -120);
        sCtx.lineTo(-15, -170);
        sCtx.lineTo(-45, -250);
        sCtx.stroke();
        
        sCtx.beginPath();
        sCtx.moveTo(-5, -80);
        sCtx.lineTo(25, -110);
        sCtx.lineTo(10, -150);
        sCtx.stroke();

        sCtx.restore();
      }

      // Center glowing aura ring
      sCtx.beginPath();
      sCtx.arc(cx, cy, 30 + Math.sin(sigilTime * 4) * 5, 0, Math.PI * 2);
      sCtx.strokeStyle = `rgba(220, 28, 28, ${0.8 * pulse})`;
      sCtx.stroke();

      sigilTime += 0.01;
      requestAnimationFrame(drawCybersigil);
    }
    drawCybersigil();

    // =========================================================================
    // 3. LIQUID PAINT CURSOR PHYSICS ENGINE
    // =========================================================================
    const cursorCanvas = document.getElementById('liquid-cursor-canvas');
    const ctx = cursorCanvas.getContext('2d');
    
    function resizeCursorCanvas() {
      cursorCanvas.width = window.innerWidth;
      cursorCanvas.height = window.innerHeight;
    }
    resizeCursorCanvas();
    
    let drop = { x: mouse.x, y: mouse.y };
    const BASE_R = 8; 
    let currentR = BASE_R;

    function animateLiquidCursor() {
      ctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);

      let targetR = isClicking ? BASE_R * 0.35 : BASE_R;
      currentR += (targetR - currentR) * 0.4; 

      let dx = mouse.x - drop.x;
      let dy = mouse.y - drop.y;
      drop.x += dx * 0.35;
      drop.y += dy * 0.35;
      
      let speed = Math.sqrt(dx * dx + dy * dy);
      let angle = Math.atan2(dy, dx);
      
      let stretch = isClicking ? 0 : Math.min(speed * 0.40, 26); 
      let majorR = currentR + stretch * 0.5;
      let minorR = Math.max(currentR - speed * 0.10, 3); 

      ctx.save();
      ctx.translate(drop.x, drop.y);
      ctx.rotate(angle);
      
      ctx.beginPath();
      ctx.ellipse(-(stretch * 0.5), 0, majorR, minorR, 0, 0, Math.PI * 2);
      ctx.fillStyle = isClicking ? '#DC1C1C' : '#ffffff'; 
      ctx.fill();
      
      ctx.restore();
      requestAnimationFrame(animateLiquidCursor);
    }
    
    if (window.matchMedia("(pointer: fine)").matches) {
      animateLiquidCursor();
    }

    // =========================================================================
    // 4. THREE.JS SOLID CHROME TEXT & LIGHTING
    // =========================================================================
    const container = document.getElementById('three-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500);
    
    // Scale for Mobile vs Desktop
    function updateCameraZ() {
      camera.position.z = window.innerWidth < 768 ? 140 : 70;
    }
    updateCameraZ();

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // --- Procedural Studio Light Map (For Realistic Chrome Reflections) ---
    const envCanvas = document.createElement('canvas');
    envCanvas.width = 1024; 
    envCanvas.height = 512;
    const envCtx = envCanvas.getContext('2d');
    envCtx.fillStyle = '#0a0a0a'; 
    envCtx.fillRect(0, 0, 1024, 512);
    
    // Paint Fake "Studio Softboxes"
    envCtx.fillStyle = '#ffffff';
    envCtx.fillRect(100, 50, 400, 80);  
    envCtx.fillRect(800, 150, 50, 300); 
    envCtx.fillRect(200, 450, 500, 20); 
    envCtx.filter = 'blur(12px)'; 
    
    const envTexture = new THREE.CanvasTexture(envCanvas);
    envTexture.mapping = THREE.EquirectangularReflectionMapping;

    // --- Physical Lighting ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    
    // Frontal Studio Highlight
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 20, 30);
    scene.add(dirLight);

    // THE CYBERSIGIL SOURCE LIGHT:
    // Placed exactly in the center, deep behind the text, to mimic the glow of the art
    const redSigilLight = new THREE.PointLight(0xDC1C1C, 8, 200);
    redSigilLight.position.set(0, 0, -25); // Push Z backwards to hit the back of the text
    scene.add(redSigilLight);

    // --- Solid Chrome Text Generation ---
    let textMesh;
    const loader = new THREE.FontLoader();
    loader.load('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/fonts/helvetiker_bold.typeface.json', function (font) {
      
      const geo = new THREE.TextGeometry('SPLOTCH', {
        font: font, 
        size: 9, 
        height: 3.5, 
        curveSegments: 8,
        bevelEnabled: true, 
        bevelThickness: 0.2, 
        bevelSize: 0.15, 
        bevelSegments: 5
      });
      geo.center(); 

      // Flawless Chrome Material
      const chromeMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, 
        metalness: 1.0,  
        roughness: 0.05, // Highly polished surface
        envMap: envTexture, 
        envMapIntensity: 2.5      
      });

      textMesh = new THREE.Mesh(geo, chromeMat);
      scene.add(textMesh);
    });

    // --- Render Loop ---
    function animate3D() {
      requestAnimationFrame(animate3D);

      if (textMesh) {
        autoSpinY += 0.005; // Independent continuous 360 rotation
        
        // Smoothly ease the drag inputs
        currentDragRot.y += (targetDragRot.y - currentDragRot.y) * 0.1;
        currentDragRot.x += (targetDragRot.x - currentDragRot.x) * 0.1;
        
        // Final Rotation = Auto Spin + User Drag Influence
        textMesh.rotation.y = autoSpinY + currentDragRot.y;
        textMesh.rotation.x = currentDragRot.x;
      }
      
      renderer.render(scene, camera);
    }
    animate3D();

    // --- Responsive Scaling ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      updateCameraZ();
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
